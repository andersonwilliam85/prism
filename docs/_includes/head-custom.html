<style>
  /* Blue gradient header — replacing Cayman's default green */
  .page-header {
    background-image: linear-gradient(120deg, #1a3a6b, #2563eb, #3b82f6);
    color: #fff;
  }

  .header-logo-link {
    display: inline-block;
    text-decoration: none;
  }

  .header-logo {
    margin-bottom: 0.5rem;
    border-radius: 12px;
  }

  /* Blue links */
  .main-content a {
    color: #2563eb;
  }

  .main-content a:hover {
    color: #1a3a6b;
  }

  /* Blue header buttons */
  .page-header .btn {
    color: rgba(255, 255, 255, 0.85);
    background-color: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.2);
  }

  .page-header .btn:hover {
    color: rgba(255, 255, 255, 0.95);
    background-color: rgba(255, 255, 255, 0.15);
    border-color: rgba(255, 255, 255, 0.3);
  }

  /* Blue heading underlines */
  .main-content h1,
  .main-content h2 {
    color: #1e40af;
  }

  /* Blue code accents */
  .main-content code {
    background-color: #dbeafe;
    color: #1e40af;
  }

  /* Mermaid diagrams — prevent code styling on rendered SVGs */
  .main-content pre.mermaid {
    background: none;
    border: none;
    padding: 0;
  }
</style>

<!-- Mermaid.js for diagram rendering (UMD build, no ESM needed) -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  // Disable auto-start — we need to convert Jekyll code blocks first
  mermaid.initialize({ startOnLoad: false, theme: 'default' });

  window.addEventListener('load', function () {
    // Jekyll renders ```mermaid as <pre><code class="language-mermaid">
    // Convert to <pre class="mermaid"> for Mermaid to find
    document.querySelectorAll('pre > code.language-mermaid').forEach(function (code) {
      var pre = code.parentElement;
      pre.classList.add('mermaid');
      pre.textContent = code.textContent;
    });
    mermaid.run({ querySelector: 'pre.mermaid' });
  });
</script>
