name: Deploy to Stage

# Run when code is merged to stage branch
on:
  push:
    branches:
      - stage

jobs:
  test:
    name: Comprehensive Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: make install-dev

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run all tests with coverage
        run: make ci-coverage

      - name: Generate reports
        if: always()
        run: |
          make test-report

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-test-results
          path: |
            playwright-report/
            htmlcov/
            test-results/
          retention-days: 30

  build:
    name: Build Stage Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools wheel

      - name: Get version
        id: version
        run: |
          VERSION="stage-${GITHUB_SHA::8}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building stage version: $VERSION"

      - name: Build distribution
        run: |
          python -m build

      - name: Create release candidate archive
        run: |
          tar -czf prism-rc-${{ steps.version.outputs.version }}.tar.gz \
            prism/ \
            scripts/ \
            install.py \
            install-ui.py \
            installer_engine.py \
            requirements.txt \
            README.md \
            LICENSE \
            Makefile \
            docs/

      - name: Generate checksums
        run: |
          cd dist/
          sha256sum * > SHA256SUMS.txt

      - name: Upload stage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prism-stage-${{ steps.version.outputs.version }}
          path: |
            dist/
            prism-rc-${{ steps.version.outputs.version }}.tar.gz
          retention-days: 30

  deploy-stage:
    name: Deploy to Stage Environment
    runs-on: ubuntu-latest
    needs: [test, build]
    environment:
      name: stage
      url: https://stage-prism.your-domain.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prism-stage-*
          path: ./deploy

      - name: Deploy to stage
        run: |
          echo "🚀 Deploying to stage environment..."
          # Add your stage deployment commands here
          echo "✅ Stage deployment complete!"

      # Example deployment steps:
      # - Deploy to stage server
      # - Update stage documentation
      # - Run integration tests
      # - Performance testing

  smoke-test:
    name: Smoke Tests on Stage
    runs-on: ubuntu-latest
    needs: [deploy-stage]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests pytest

      - name: Run smoke tests
        run: |
          echo "💨 Running smoke tests against stage..."
          # Add smoke test commands here
          # Example: pytest tests/smoke/ --base-url=https://stage-prism.your-domain.com
          echo "✅ Smoke tests passed!"

  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [deploy-stage, smoke-test]
    if: always()
    steps:
      - name: Stage deployment status
        run: |
          if [ "${{ needs.deploy-stage.result }}" == "success" ] && \
             [ "${{ needs.smoke-test.result }}" == "success" ]; then
            echo "✅ Stage deployment and smoke tests successful!"
            echo "Ready for promotion to production"
          else
            echo "❌ Stage deployment or smoke tests failed!"
            exit 1
          fi
