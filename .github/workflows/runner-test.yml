name: Runner Test

on:
  push:
    branches: [dev]

jobs:
  hello:
    name: Legion runner check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hello from Legion
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "OS: $(uname -a)"
          echo "Working dir: $(pwd)"
          echo "✅ Gitea Actions on Legion is live"
