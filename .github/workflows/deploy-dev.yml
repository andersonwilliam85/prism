name: Deploy to Dev

# Run when code is merged to dev branch
on:
  push:
    branches:
      - dev

jobs:
  test:
    name: Quick Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: make install-dev

      - name: Run lint and unit tests
        run: make check

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-test-results
          path: |
            test-results/
          retention-days: 7

  build:
    name: Build Dev Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Get version
        id: version
        run: |
          VERSION="dev-${GITHUB_SHA::8}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building dev version: $VERSION"

      - name: Create dev snapshot
        run: |
          tar -czf prism-dev-${{ steps.version.outputs.version }}.tar.gz \
            scripts/ \
            install-ui.py \
            auto-deploy-docs.py \
            requirements.txt \
            README.md

      - name: Upload dev artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prism-dev-${{ steps.version.outputs.version }}
          path: prism-dev-${{ steps.version.outputs.version }}.tar.gz
          retention-days: 7

  deploy-dev:
    name: Deploy to Dev Environment
    runs-on: ubuntu-latest
    needs: [test, build]
    environment:
      name: dev
      url: https://dev-prism.your-domain.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prism-dev-*
          path: ./deploy

      - name: Deploy to dev
        run: |
          echo "🚀 Deploying to dev environment..."
          # Add your dev deployment commands here
          echo "✅ Dev deployment complete!"

      # Example deployment steps:
      # - Deploy to dev server
      # - Update dev documentation
      # - Run smoke tests

  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    if: always()
    steps:
      - name: Dev deployment status
        run: |
          if [ "${{ needs.deploy-dev.result }}" == "success" ]; then
            echo "✅ Dev deployment successful!"
          else
            echo "⚠️ Dev deployment had issues"
          fi
