name: CI

on:
  pull_request:
    branches: [dev, stage, main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          make install-dev

      - name: Check formatting
        run: make format-check

      - name: Run linters
        run: make lint

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: make install-dev

      - name: Run tests
        run: make test-unit

  cli:
    name: CLI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: make install-dev

      - name: Run tests
        run: make test-cli

  web:
    name: Web API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: make install-dev

      - name: Run tests
        run: make test-web

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: make install-dev

      - name: Run tests
        run: make test-integration

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: make install-dev

      - name: Run tests with coverage
        run: make test-coverage

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e-browser:
    name: Browser E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: make install-dev

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run browser E2E tests
        run: |
          pytest tests/e2e/test_installer_flow.py \
                 tests/e2e/test_complete_installation.py \
                 tests/e2e/test_validation_and_ux.py \
                 -v --tracing=on

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install tools
        run: pip install safety bandit

      - name: Check dependencies
        run: pip freeze | safety check --stdin
        continue-on-error: true

      - name: Scan code
        run: bandit -r scripts/ -f json -o bandit-report.json
        continue-on-error: true

  gate:
    name: All checks
    runs-on: ubuntu-latest
    needs: [lint, unit, cli, web, integration, coverage, e2e-browser]
    if: always()
    steps:
      - name: Verify results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.unit.result }}" != "success" ] || \
             [ "${{ needs.cli.result }}" != "success" ] || \
             [ "${{ needs.web.result }}" != "success" ] || \
             [ "${{ needs.integration.result }}" != "success" ] || \
             [ "${{ needs.coverage.result }}" != "success" ] || \
             [ "${{ needs.e2e-browser.result }}" != "success" ]; then
            echo "Some checks failed"
            exit 1
          fi
