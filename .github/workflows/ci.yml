name: CI

on:
  pull_request:
    branches: [dev, stage, main]
    paths-ignore: ['docs/**', '*.md', 'LICENSE']
  push:
    branches: [dev, stage, main]
    paths-ignore: ['docs/**', '*.md', 'LICENSE']

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Set up venv
        run: python3 -m venv .venv && echo "$PWD/.venv/bin" >> $GITHUB_PATH
      - name: Install dependencies
        run: pip install --upgrade pip && make install-dev
      - name: Format check
        run: make format-check
      - name: Lint
        run: make lint

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Set up venv
        run: python3 -m venv .venv && echo "$PWD/.venv/bin" >> $GITHUB_PATH
      - name: Install dependencies
        run: pip install --upgrade pip && make install-dev
      - name: Tests
        run: make test-unit && make test-cli && make test-web && make test-integration
      - name: Coverage
        run: make test-coverage

  e2e:
    name: E2E
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up venv
        run: python3 -m venv .venv && echo "$PWD/.venv/bin" >> $GITHUB_PATH
      - name: Install dependencies
        run: pip install --upgrade pip && make install-dev
      - name: Install Playwright
        run: python -m playwright install chromium --with-deps
      - name: Run E2E tests
        run: pytest tests/e2e/ -v --tracing=on
      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  gate:
    name: All checks passed
    runs-on: self-hosted
    needs: [lint, test, e2e]
    if: always()
    steps:
      - name: Verify
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "One or more checks failed"; exit 1
          fi
