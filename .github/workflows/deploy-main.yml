name: Deploy to Main (Production)

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: make install-dev

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run all tests
        run: make test-all

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-main
          path: |
            playwright-report/
            test-results/

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Get version
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-${GITHUB_SHA::8}")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build distribution packages
        run: |
          python -m build
          ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist/
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prism-release-${{ steps.version.outputs.version }}
          path: dist/
          retention-days: 90

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prism-release-*
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/**/*
          body: |
            ## Prism ${{ github.ref_name }}

            ### Installation
            ```bash
            pip install prism-${{ github.ref_name }}-py3-none-any.whl
            ```

            See `SHA256SUMS.txt` for checksums.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
