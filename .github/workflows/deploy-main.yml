name: Deploy to Main (Production)

# Run when code is merged to main branch
on:
  push:
    branches:
      - main

jobs:
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: make install-dev

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run all tests
        run: make test-all

      - name: Generate test reports
        if: always()
        run: make test-report

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-main
          path: |
            playwright-report/
            test-results/

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper versioning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools wheel

      - name: Get version from git tag
        id: version
        run: |
          # Get the latest git tag or use commit hash
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-${GITHUB_SHA::8}")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build distribution packages
        run: |
          python -m build
          ls -lh dist/

      - name: Create release archive
        run: |
          tar -czf prism-release-${{ steps.version.outputs.version }}.tar.gz \
            scripts/ \
            install-ui.py \
            auto-deploy-docs.py \
            requirements.txt \
            README.md \
            LICENSE \
            Makefile \
            DASHBOARD_COMMANDS.md \
            docs/

      - name: Generate checksums
        run: |
          cd dist/
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prism-release-${{ steps.version.outputs.version }}
          path: |
            dist/
            prism-release-${{ steps.version.outputs.version }}.tar.gz
          retention-days: 90  # Keep releases for 90 days

  publish-artifacts:
    name: Publish Release Artifacts
    runs-on: ubuntu-latest
    needs: [test, build]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prism-release-*
          path: ./artifacts

      - name: Get version
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-${GITHUB_SHA::8}")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')  # Only create release for tagged commits
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/**/*
          body: |
            ## Prism Release ${{ steps.version.outputs.version }}
            
            ### What's Included
            - 📦 Distribution packages (wheel + source)
            - 📝 Complete source code archive
            - 🔐 SHA256 checksums
            - 📚 Documentation
            
            ### Installation
            ```bash
            pip install prism-package-manager-${{ steps.version.outputs.version }}.whl
            ```
            
            ### Checksums
            See `SHA256SUMS.txt` in the artifacts.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, build, publish-artifacts]
    environment:
      name: production
      url: https://your-prism-production-url.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prism-release-*
          path: ./deploy

      - name: Deploy notification
        run: |
          echo "✅ Deployment to production complete!"
          echo "Artifacts available in GitHub Releases"

      # Add your actual deployment steps here
      # Examples:
      # - Deploy to cloud provider
      # - Update package registry
      # - Send notifications
      # - Update documentation site

  notify:
    name: Deployment Notifications
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Deployment status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "🎉 Main deployment successful!"
          else
            echo "❌ Main deployment failed!"
            exit 1
          fi

      # Add notification integrations here:
      # - Slack webhook
      # - Email notifications
      # - Teams webhook
      # - Custom webhooks
