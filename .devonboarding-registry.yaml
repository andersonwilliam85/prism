# ============================================================================
# DEV ONBOARDING PACKAGE REGISTRY CONFIGURATION
# ============================================================================
# Configure where to fetch config packages from

# Default public registry
default_registry:
  type: "github"
  url: "https://github.com/andersonwilliam85/prism-packages"
  branch: "main"
  enabled: true

# Additional registries (checked in order)
registries:
  # Public community registry (GitHub)
  - name: "community"
    type: "github"
    url: "https://github.com/andersonwilliam85/prism-community-packages"
    branch: "main"
    enabled: true
    priority: 1
  
  # npm registry (future)
  - name: "npm"
    type: "npm"
    package_prefix: "@prism-dx/"
    enabled: false
    priority: 2
  
  # PyPI registry (future)
  - name: "pypi"
    type: "pypi"
    package_prefix: "prism-"
    enabled: false
    priority: 3
  
  # Company-internal registry (example)
  - name: "corporate"
    type: "git"
    url: "https://git.yourcompany.com/devtools/onboarding-packages"
    branch: "main"
    enabled: false
    priority: 10
  
  # Local filesystem (always enabled)
  - name: "local"
    type: "local"
    path: "config-packages/"
    enabled: true
    priority: 100  # Always checked last

# Cache settings
cache:
  enabled: true
  directory: "~/.prism/cache"
  ttl_hours: 24

# i18n settings (future)
i18n:
  enabled: false
  default_locale: "en_US"
  supported_locales:
    - "en_US"
    # Future:
    # - "es_ES"
    # - "fr_FR"
    # - "de_DE"
    # - "ja_JP"
    # - "zh_CN"
  
  # Translation file location
  translations_dir: "locales/"
