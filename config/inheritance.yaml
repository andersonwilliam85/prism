# Hierarchical Config Inheritance System
# Supports multi-level organizational structure
# Configs are deep-merged in order (later overrides earlier)

# ============================================================================
# INHERITANCE CHAIN
# ============================================================================
# Each level can add, override, or remove from previous levels
# Order: Company → Sub-org → Department → Team → User

chain:
  # 1. COMPANY BASE (Required)
  # Core settings that apply to everyone in the company
  company:
    file: "config/base/walmart.yaml"  # Change to your company
    description: "Company-wide baseline configuration"
    examples:
      - "Proxy settings"
      - "Artifact repositories (Maven, npm, pip)"
      - "Enterprise GitHub/GitLab URL"
      - "Core security tools (VPN, SSO CLI)"
      - "Compliance requirements"
  
  # 2. SUB-ORGANIZATION (Optional)
  # For large companies with multiple business units
  # Examples: Walmart US, Sam's Club, Walmart International
  sub_org:
    file: null  # Will prompt during install or use ${SUB_ORG} env var
    description: "Sub-organization or business unit specific config"
    examples:
      - "Region-specific cloud accounts (AWS/GCP/Azure)"
      - "Sub-org internal tools"
      - "Compliance requirements (GDPR, SOC2, etc.)"
      - "Different artifact repositories per region"
  
  # 3. DEPARTMENT (Optional)
  # Functional area within sub-org
  # Examples: Supply Chain Tech, E-commerce, Data Engineering
  department:
    file: null  # Will prompt during install or use ${DEPARTMENT} env var
    description: "Department/functional area specific config"
    examples:
      - "Department-specific tools (BigQuery for Data, Docker for Platform)"
      - "Department Slack channels, Confluence spaces"
      - "Tech stack (Java vs Node vs Python)"
      - "Database access (Postgres vs MySQL vs BigQuery)"
  
  # 4. TEAM (Optional)
  # Specific product/project team
  # Examples: Receiving Systems, Checkout Frontend, Analytics Platform
  team:
    file: null  # Will prompt during install or use ${TEAM} env var
    description: "Team/project specific configuration"
    examples:
      - "Team-specific repositories"
      - "Project scaffolding templates"
      - "Team conventions (linting, formatting)"
      - "Monitoring/observability tools"
  
  # 5. USER (Required)
  # Individual developer preferences
  user:
    file: "config/user-profile.yaml"
    description: "Personal settings and career tracking"
    examples:
      - "IDE preference (VSCode vs IntelliJ)"
      - "Personal git config"
      - "Career goals, wins, 1-on-1 notes"
      - "Optional tools selection"

# ============================================================================
# AVAILABLE CONFIGURATIONS
# ============================================================================

# Sub-organizations (adjust for your company)
available_sub_orgs:
