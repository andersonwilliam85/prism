  - id: "walmart-intl"
    name: "Walmart International"
    file: "config/orgs/walmart-intl.yaml"
    description: "Walmart International markets"
  
  - id: "none"
    name: "None (Company base only)"
    file: null
    description: "Skip sub-org configuration"

