  - id: "none"
    name: "None"
    file: null
    description: "Skip team configuration"

# ============================================================================
# MERGE STRATEGY
# ============================================================================

merge_strategy:
  # How to merge arrays (lists)
  arrays:
    tools_selected: "union"           # Combine all selected tools from all levels
    tools_excluded: "union"           # Combine all excluded tools
    resources: "append"               # Keep all resource links in order
    onboarding_tasks: "append"        # All onboarding tasks from all levels
    slack_channels: "union"           # All relevant Slack channels
  
  # How to merge objects (dictionaries)
  objects:
    environment: "deep_merge"         # Deep merge proxy, maven, npm settings
    git: "override"                   # User config overrides all
    career: "user_only"               # Only from user profile
    tools: "deep_merge"               # Merge tool definitions
  
  # Special handling for tools
  tools:
    # If company says required=true, can team/user override to false?
    required_override: "allow"        # Teams can make company tools optional
    
    # If company excludes a tool, can team/user re-add it?
    excluded_override: "deny"         # Company exclusions are final
    
    # Version conflicts (company wants npm 20, team wants npm 18)
    version_conflict: "latest_wins"   # User/Team config wins
  
  # Conflict resolution
  conflicts:
    # If multiple levels specify different values:
    default: "override"               # Later (more specific) config wins
    
    # Special cases:
    proxy: "first_defined"            # Use first non-null proxy config
    maven_mirrors: "append"           # Combine all Maven mirrors
    npm_scopes: "deep_merge"          # Merge npm scope configs

# ============================================================================
# ENVIRONMENT VARIABLE SUBSTITUTION
# ============================================================================
# Use ${VAR_NAME} in configs, will be replaced from:

env_sources:
  - environment        # OS environment variables
  - .env              # .env file in package root
  - prompt            # Ask user during install if not found

# Common environment variables:
# ${SUB_ORG}     - Sub-organization ID (walmart-us, sams-club, etc.)
# ${DEPARTMENT}  - Department ID (supply-chain, ecommerce, etc.)
# ${TEAM}        - Team ID (receiving-systems, checkout-frontend, etc.)
# ${REGION}      - Geographic region (us-east, us-west, apac, eu)
# ${ENV}         - Environment type (dev, staging, prod)
# ${USER}        - OS username
# ${EMAIL}       - User email (from git or prompt)

# ============================================================================
# AUTO-DETECTION
# ============================================================================
# Automatically detect config from environment

auto_detect:
  # Try to auto-detect sub-org from:
  sub_org:
    - git_remote        # Parse from git remote URL (github.walmart.com/walmart-us/...)
    - email_domain      # Parse from email (@walmart.com vs @samsclub.com)
    - hostname          # Parse from machine hostname
    - env_var           # ${SUB_ORG} environment variable
  
  # Try to auto-detect department from:
  department:
    - git_remote        # Parse from repo path (github.com/walmart/supply-chain/...)
    - project_path      # Scan ~/Development/projects for common patterns
    - env_var           # ${DEPARTMENT} environment variable
  
  # Try to auto-detect team from:
  team:
    - git_remote        # Parse from repo name
    - env_var           # ${TEAM} environment variable

# ============================================================================
# VALIDATION
# ============================================================================

validation:
  # Require certain levels?
  require_company: true      # Must have company base config
  require_sub_org: false     # Optional
  require_department: false  # Optional
  require_team: false        # Optional
  require_user: true         # Must have user profile
  
  # Warn if missing recommended levels?
  warn_missing_department: true
  warn_missing_team: true
  
  # Validate tool compatibility?
  check_tool_conflicts: true  # Error if tools conflict (e.g., Docker + Rancher)
