    name: "E-commerce Engineering"
    file: "config/departments/ecommerce.yaml"
    description: "Web, mobile apps, digital checkout"
    sub_orgs: ["walmart-us", "walmart-intl"]
  
  # Data & Analytics
  - id: "data-engineering"
    name: "Data Engineering"
    file: "config/departments/data-engineering.yaml"
    description: "Data pipelines, analytics, ML"
    sub_orgs: null  # Available to all sub-orgs
  
  # Platform & Infrastructure
  - id: "platform"
    name: "Platform & Infrastructure"
    file: "config/departments/platform.yaml"
    description: "Kubernetes, cloud, SRE, DevOps"
    sub_orgs: null
  
  # Store Technology
  - id: "store-tech"
    name: "Store Technology"
    file: "config/departments/store-tech.yaml"
