# Dev Tools Configuration
# Make this injectable for different environments!

# Standard development tools
tools:
  git:
    description: "Version control system"
    required: true
    verify: "git --version"
    install:
      mac:
        method: brew
        package: git
      windows:
        method: winget
        package: Git.Git
      ubuntu:
        method: apt
        package: git

  # Java ecosystem
  openjdk:
    description: "OpenJDK 17 (LTS)"
    required: false
    verify: "java -version"
    install:
      mac:
        method: brew
        package: openjdk@17
      windows:
        method: winget
        package: Microsoft.OpenJDK.17
      ubuntu:
        method: apt
        package: openjdk-17-jdk

  maven:
    description: "Maven build tool"
    required: false
    verify: "mvn --version"
    install:
      mac:
        method: brew
        package: maven
      windows:
        method: winget
        package: Apache.Maven
      ubuntu:
        method: apt
        package: maven

  gradle:
    description: "Gradle build tool"
    required: false
    verify: "gradle --version"
    install:
      mac:
        method: brew
        package: gradle
      windows:
        method: winget
        package: Gradle.Gradle
      ubuntu:
        method: apt
        package: gradle

  # Python ecosystem
  python:
    description: "Python 3.11+"
    required: false
    verify: "python3 --version"
    install:
      mac:
        method: brew
        package: python@3.11
      windows:
        method: winget
        package: Python.Python.3.11
      ubuntu:
        method: apt
        package: python3.11

  # Node.js ecosystem
  nodejs:
    description: "Node.js 20 LTS"
    required: false
    verify: "node --version"
    install:
      mac:
        method: brew
        package: node@20
      windows:
        method: winget
        package: OpenJS.NodeJS.LTS
      ubuntu:
        method: script
        commands:
          - "curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -"
          - "sudo apt-get install -y nodejs"

  # Container & K8s tools
  rancher-desktop:
    description: "Rancher Desktop (Docker + Kubernetes)"
    required: false
    verify: "rdctl version"
    install:
      mac:
        method: brew
        package: rancher-desktop
        cask: true
      windows:
        method: download
        url: "https://github.com/rancher-sandbox/rancher-desktop/releases/latest/download/Rancher.Desktop.Setup.exe"
      ubuntu:
        method: download
        url: "https://github.com/rancher-sandbox/rancher-desktop/releases/latest/download/rancher-desktop-amd64.deb"

  kubectl:
    description: "Kubernetes CLI"
    required: false
    verify: "kubectl version --client"
    install:
      mac:
        method: brew
        package: kubectl
      windows:
        method: winget
        package: Kubernetes.kubectl
      ubuntu:
        method: script
        commands:
          - "curl -LO 'https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl'"
          - "sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl"

  skaffold:
    description: "Kubernetes development workflow"
    required: false
    verify: "skaffold version"
    install:
      mac:
        method: brew
        package: skaffold
      windows:
        method: chocolatey
        package: skaffold
      ubuntu:
        method: script
        commands:
          - "curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64"
          - "sudo install skaffold /usr/local/bin/"

  helm:
    description: "Kubernetes package manager"
    required: false
    verify: "helm version"
    install:
      mac:
        method: brew
        package: helm
      windows:
        method: winget
        package: Helm.Helm
      ubuntu:
        method: script
        commands:
          - "curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash"

  # Cloud CLIs (optional)
  gcloud:
    description: "Google Cloud CLI"
    required: false
    verify: "gcloud --version"
    install:
      mac:
        method: brew
        package: google-cloud-sdk
        cask: true
      windows:
        method: download
        url: "https://dl.google.com/dl/cloudsdk/channels/rapid/GoogleCloudSDKInstaller.exe"
      ubuntu:
        method: script
        commands:
          - "sudo apt-get install apt-transport-https ca-certificates gnupg"
          - "echo 'deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main' | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list"
          - "curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo apt-key --keyring /usr/share/keyrings/cloud.google.gpg add -"
          - "sudo apt-get update && sudo apt-get install google-cloud-cli"

  # GitHub CLI
  gh:
    description: "GitHub CLI for repo management"
    required: false
    verify: "gh --version"
    install:
      mac:
        method: brew
        package: gh
      windows:
        method: winget
        package: GitHub.cli
      ubuntu:
        method: script
        commands:
          - "curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg"
          - "echo 'deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main' | sudo tee /etc/apt/sources.list.d/github-cli.list"
          - "sudo apt update && sudo apt install gh"

  # Azure CLI
  azure-cli:
    description: "Azure command-line interface"
    required: false
    verify: "az --version"
    install:
      mac:
        method: brew
        package: azure-cli
      windows:
        method: winget
        package: Microsoft.AzureCLI
      ubuntu:
        method: script
        commands:
          - "curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash"

  # BigQuery CLI (part of gcloud)
  bq:
    description: "BigQuery command-line tool"
    required: false
    verify: "bq version"
    depends_on: gcloud
    install:
      mac:
        method: brew
        package: google-cloud-sdk
        cask: true
      windows:
        method: included
        note: "Installed with gcloud"
      ubuntu:
        method: included
        note: "Installed with gcloud"

  # JQ for JSON processing
  jq:
    description: "JSON processor (useful for API work)"
    required: false
    verify: "jq --version"
    install:
      mac:
        method: brew
        package: jq
      windows:
        method: winget
        package: jqlang.jq
      ubuntu:
        method: apt
        package: jq

  # YQ for YAML processing
  yq:
    description: "YAML processor"
    required: false
    verify: "yq --version"
    install:
      mac:
        method: brew
        package: yq
      windows:
        method: winget
        package: MikeFarah.yq
      ubuntu:
        method: script
        commands:
          - "sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq"
          - "sudo chmod +x /usr/bin/yq"

  # Code Puppy (optional Walmart tool)
  code-puppy:
    description: "AI coding assistant"
    required: false
    verify: "puppy --version"
    install:
      mac:
        method: custom
        url: "https://puppy.walmart.com/install"
        instructions: "Visit https://puppy.walmart.com to install"
      windows:
        method: custom
        url: "https://puppy.walmart.com/install"
        instructions: "Visit https://puppy.walmart.com to install"
      ubuntu:
        method: custom
        url: "https://puppy.walmart.com/install"
        instructions: "Visit https://puppy.walmart.com to install"

# Platform-specific package managers
package_managers:
  mac:
    brew:
      check: "brew --version"
      install: '/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"'
  
  windows:
    winget:
      check: "winget --version"
      install: "Built into Windows 10/11, update via Microsoft Store if missing"
    chocolatey:
      check: "choco --version"
      install: 'Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString("https://community.chocolatey.org/install.ps1"))'
  
  ubuntu:
    apt:
      check: "apt --version"
      install: "Pre-installed"

# Environment-specific configurations (injectable!)
environment:
  # Walmart-specific settings
  proxy:
    http: "http://sysproxy.wal-mart.com:8080"
    https: "http://sysproxy.wal-mart.com:8080"
    no_proxy: "localhost,127.0.0.1,.walmart.com"
  
  # Walmart artifact repositories
  maven:
    settings_xml: |
      <settings>
        <mirrors>
          <mirror>
            <id>walmart-maven</id>
            <url>https://maven.ci.artifacts.walmart.com/artifactory/maven-virtual/</url>
            <mirrorOf>central</mirrorOf>
          </mirror>
        </mirrors>
      </settings>
  
  npm:
    registry: "https://npm.ci.artifacts.walmart.com/artifactory/api/npm/npm-virtual/"
  
  pip:
    index_url: "https://pypi.ci.artifacts.walmart.com/artifactory/api/pypi/external-pypi/simple"
    trusted_host: "pypi.ci.artifacts.walmart.com"
