# User Profile Configuration
# This file stores user preferences and setup progress

# User Information
user:
  # Git configuration
  name: ""                    # Full name for git commits
  email: ""                   # Email for git commits
  username: ""                # Corporate username (e.g., w0a035b)
  
  # Team/Org information
  team: ""                    # Team name
  department: ""              # Department
  manager: ""                 # Manager name (optional)
  
  # Preferences
  editor: "vim"               # Preferred text editor (vim, nano, code)
  shell: "bash"               # Preferred shell (bash, zsh, fish)
  
# Git Configuration
git:
  # Global settings
  signing_key: ""             # GPG key for commit signing (optional)
  default_branch: "main"      # Default branch name
  
  # SSH Configuration
  ssh:
    generate_key: true        # Generate SSH key during setup?
    key_type: "ed25519"       # ed25519 (recommended) or rsa
    key_comment: ""           # Comment for SSH key (usually email)
    
  # GitHub/GitLab configuration (example: Walmart GitHub Enterprise)
  github:
    username: ""              # GitHub username
    enterprise_url: "https://github.walmart.com"  # Company GitHub Enterprise URL
  
  # Common git aliases
  aliases:
    co: "checkout"
    br: "branch"
    ci: "commit"
    st: "status"
    unstage: "reset HEAD --"
    last: "log -1 HEAD"
    visual: "log --graph --oneline --all"

# Development Environment
dev_environment:
  # Base folder location
  root: "~/Development"
  
  # Folder structure to create
  folders:
    - projects
    - experiments
    - learning
    - opensource
    - tooling
    - archive
    - docs
  
  # Documentation server
  docs_server:
    enabled: true
    port: 8000
    auto_scan: true
    scan_interval: 300  # seconds

# Tools to Install (user selections)
tools_selected:
  # Core (usually required)
  git: true
  
  # Java ecosystem
  openjdk: false
  maven: false
  gradle: false
  
  # Python ecosystem
  python: false
  
  # Node.js ecosystem
  nodejs: false
  
  # Container & K8s
  rancher-desktop: false
  kubectl: false
  skaffold: false
  helm: false
  
  # Cloud CLIs
  gcloud: false
  azure-cli: false
  bq: false
  
  # Utilities
  gh: false
  jq: false
  yq: false
  
  # IDEs and Editors
  vscode: false
  intellij: false
  pycharm: false
  webstorm: false
  vim: false
  
  # Database Tools
  dbeaver: false
  
  # Optional tools
  code-puppy: false

