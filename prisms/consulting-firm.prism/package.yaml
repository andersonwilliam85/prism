# ============================================================================
# CONSULTING FIRM PRISM
# ============================================================================
# For consultants and agency developers who work across multiple clients
# simultaneously. Handles the real pain points: environment isolation,
# credential management, context switching, time tracking, and keeping
# client data separate.
#
# Each client gets a sub-prism with its own git identity, cloud credentials,
# SSH keys, VPN config, and tooling requirements.

package:
  name: "consulting-firm-prism"
  version: "2.0.0"
  description: "Multi-client consulting setup — isolated environments, credential management, and fast context switching"
  author: "Consulting Firm IT"
  homepage: "https://consultingfirm.com"
  support:
    email: "it@consultingfirm.com"

  type: "consulting"

  requires:
    onboarding_version: ">=1.0.0"

# PRISM META-CONFIGURATION
prism_config:
  theme: "consultant"
  theme_options:
    - "consultant"
    - "purple"
    - "midnight"
    - "ocean"
  custom_themes:
    - id: "consultant"
      name: "Consultant"
      gradient_1: "#7c3aed"
      gradient_2: "#8b5cf6"
      gradient_3: "#a78bfa"
      gradient_4: "#06b6d4"
      gradient_5: "#22d3ee"

  sources:
    - url: "local"
      name: "Built-in Prisms"
      type: "local"

  branding:
    name: "Consulting Firm Prism"
    tagline: "Isolated environments, every client"
    primary_color: "#7c3aed"
    secondary_color: "#06b6d4"

# BUNDLED SUB-PRISMS
# base is required and sets up the workspace structure, shell aliases,
# git multi-identity, and firm-wide tooling.
# Client configs are optional — pick the ones matching your engagements.
bundled_prisms:
  base:
    - id: "consulting-base"
      name: "Consulting Base"
      description: "Workspace structure, shell aliases, git multi-identity, firm tools"
      required: true
      config: "base/consulting-firm.yaml"

  clients:
    - id: "client-fintech"
      name: "FinTech Client (Meridian)"
      description: "AWS stack, SOX/PCI-DSS, Python microservices, PostgreSQL"
      config: "clients/fintech-client.yaml"

    - id: "client-healthcare"
      name: "Healthcare Client (Solace Health)"
      description: "Azure stack, HIPAA, .NET backend, React frontend"
      config: "clients/healthcare-client.yaml"

    - id: "client-retail"
      name: "Retail Client (BrightCart)"
      description: "GCP stack, PCI-DSS, Node.js/TypeScript, Shopify integrations"
      config: "clients/retail-client.yaml"

# SETUP CONFIGURATION
setup:
  install:
    target_dir: "config/"

    files:
      - source: "welcome.yaml"
        dest: "config/welcome.yaml"
      - source: "resources.yaml"
        dest: "config/resources.yaml"

    directories:
      - source: "base/"
        dest: "config/base/"
      - source: "clients/"
        dest: "config/clients/"

  post_install:
    message: |
      Consulting firm prism installed.

      Your workspace will be organized as:
        ~/clients/active/<client>/    Current engagements
        ~/clients/archived/<client>/  Past engagements
        ~/internal/tools/             Firm's internal tools
        ~/internal/templates/         SOW, proposal, invoice templates
        ~/learning/                   Skill development between gigs

      Next steps:
        1. Run 'client-init <client-name>' to scaffold a new client directory
        2. Run 'cswitch <client-name>' to activate a client context
        3. Review per-client git/SSH/cloud configs in each client's .client/ folder

# User info fields — collected during onboarding
user_info_fields:
  - id: "name"
    label: "Full Name"
    type: "text"
    required: true
    placeholder: "Jordan Rivera"

  - id: "firm_email"
    label: "Firm Email"
    type: "email"
    required: true
    placeholder: "jordan@consultingfirm.com"

  - id: "personal_email"
    label: "Personal / GitHub Email"
    type: "email"
    required: false
    placeholder: "jordan@example.com"
    description: "Used for open-source and personal commits"

  - id: "consultant_id"
    label: "Consultant ID"
    type: "text"
    required: true
    placeholder: "CON-123"

  - id: "active_clients"
    label: "Active Client Engagements"
    type: "multiselect"
    required: true
    options:
      - "FinTech Client (Meridian)"
      - "Healthcare Client (Solace Health)"
      - "Retail Client (BrightCart)"
      - "Other"
    description: "Select all clients you are currently staffed on"

  - id: "billable_hours_tracker"
    label: "Time Tracking System"
    type: "select"
    required: true
    options:
      - "Harvest"
      - "Toggl"
      - "Clockify"
      - "Jira Tempo"
      - "Other"

distribution:
  local:
    path: "prisms/consulting-firm.prism/"
    discoverable: true

metadata:
  tags:
    - consulting
    - agency
    - multi-client
    - professional-services
    - freelance
    - contractor
  company_size: "any"
  regions: ["Global"]
  last_updated: "2026-03-15"
