# ============================================================================
# CONSULTING FIRM PRISM
# ============================================================================
# For consulting/agency firms working with multiple clients.
# Each client gets their own sub-prism with context-specific tools and config.

package:
  name: "consulting-firm-prism"
  version: "1.0.0"
  description: "Consulting firm prism — multi-client support with per-client configuration"
  author: "Consulting Firm IT"
  homepage: "https://consultingfirm.com"
  support:
    email: "it@consultingfirm.com"

  type: "consulting"

  requires:
    onboarding_version: ">=1.0.0"
    python_version: ">=3.8"

# PRISM META-CONFIGURATION
prism_config:
  theme: "purple"
  theme_options:
    - "purple"
    - "midnight"
    - "ocean"

  sources:
    - url: "local"
      name: "Built-in Prisms"
      type: "local"

  branding:
    name: "Consulting Firm Prism"
    tagline: "Adapt to every client"
    primary_color: "#7c3aed"
    secondary_color: "#06b6d4"

# BUNDLED SUB-PRISMS
# base is required; clients are optional (user picks one)
bundled_prisms:
  base:
    - id: "consulting-base"
      name: "Consulting Base"
      description: "Core consulting firm setup"
      required: true
      config: "base/consulting-firm.yaml"

  clients:
    - id: "client-fintech"
      name: "FinTech Client"
      description: "Financial technology — SOX, PCI-DSS compliant"
      config: "clients/fintech-client.yaml"

    - id: "client-healthcare"
      name: "Healthcare Client"
      description: "Healthcare technology — HIPAA compliant"
      config: "clients/healthcare-client.yaml"

    - id: "client-retail"
      name: "Retail Client"
      description: "Retail/e-commerce — PCI-DSS compliant"
      config: "clients/retail-client.yaml"

# SETUP CONFIGURATION
setup:
  install:
    target_dir: "config/"

    files:
      - source: "welcome.yaml"
        dest: "config/welcome.yaml"
      - source: "resources.yaml"
        dest: "config/resources.yaml"

    directories:
      - source: "base/"
        dest: "config/base/"
      - source: "clients/"
        dest: "config/clients/"

  post_install:
    message: |
      🎯 Consulting firm prism installed!

      You'll be working across multiple client projects.
      Each client has their own configuration and compliance requirements.

      Next steps:
      1. Select your primary client engagement
      2. Review client-specific compliance docs
      3. Set up client VPN/access if required

# User info fields
user_info_fields:
  - id: "name"
    label: "Full Name"
    type: "text"
    required: true
    placeholder: "Jordan Consultant"

  - id: "email"
    label: "Company Email"
    type: "email"
    required: true
    placeholder: "jordan@consultingfirm.com"

  - id: "consultant_id"
    label: "Consultant ID"
    type: "text"
    required: true
    placeholder: "CON-123"

  - id: "primary_client"
    label: "Primary Client"
    type: "select"
    required: true
    options:
      - "FinTech Client"
      - "Healthcare Client"
      - "Retail Client"
      - "Other"
    description: "The client engagement you'll be working on"

  - id: "compliance_framework"
    label: "Compliance Framework"
    type: "select"
    required: true
    depends_on: "primary_client"
    options:
      - "SOX"
      - "PCI-DSS"
      - "HIPAA"
      - "General"
    option_map:
      "FinTech Client":
        - "SOX"
        - "PCI-DSS"
      "Healthcare Client":
        - "HIPAA"
      "Retail Client":
        - "PCI-DSS"
      "Other":
        - "General"

  - id: "billable_hours_tracker"
    label: "Time Tracking System"
    type: "select"
    required: false
    options:
      - "Harvest"
      - "Toggl"
      - "Clockify"
      - "Other"

distribution:
  local:
    path: "prisms/consulting-firm.prism/"
    discoverable: true

metadata:
  tags:
    - consulting
    - agency
    - multi-client
    - professional-services

  company_size: "medium"
  regions: ["Global"]
  last_updated: "2026-03-05"
