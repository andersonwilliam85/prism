# Tool Registry — single source of truth for every installable tool.
# Child configs reference tools by name only (e.g. "- git").
# Sub-prisms can define their own tool-registry.yaml to add tools.
#
# Fields:
#   label       — display name (shown in UI)
#   summary     — short tagline (always visible next to label)
#   description — full explanation (shown on hover)
#   category    — grouping key
#   platforms   — explicit install commands per OS
#   uninstall   — explicit uninstall commands per OS (for rollback)

git:
  label: Git
  summary: Version control
  description: Track changes, branch, merge, and collaborate on code
  category: core
  platforms:
    mac: brew install git
    ubuntu: sudo apt-get install -y git
    linux: sudo apt-get install -y git
    windows: winget install Git.Git
  uninstall:
    mac: brew uninstall git
    ubuntu: sudo apt-get remove -y git
    linux: sudo apt-get remove -y git
    windows: winget uninstall Git.Git

