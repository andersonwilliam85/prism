# Prism Base Configuration
# Applied to all environments by default

git_config:
  default_branch: "main"
  pull_rebase: true
  init_default_branch: "main"
  core_autocrlf: "input"

workspace:
  root: "~/workspace"
  structure:
    - projects
    - experiments
    - learning
    - archived
    - docs
    - tooling

tools_required:
  - name: "git"
    description: "Track changes, branch, merge, and collaborate on code"
    category: "core"
    platforms:
      mac: "brew install git"
      ubuntu: "sudo apt-get install -y git"
      linux: "sudo apt-get install -y git"
      windows: "winget install Git.Git"

tools_optional:
  # ── Editors ──
  - name: "cursor"
    description: "VS Code fork with built-in AI pair programming (Copilot++)"
    category: "editor"
    platforms:
      mac: "brew install --cask cursor"
      ubuntu: "curl -fsSL https://www.cursor.com/download/linux | sh"
      linux: "curl -fsSL https://www.cursor.com/download/linux | sh"
      windows: "winget install Anysphere.Cursor"

  - name: "code"
    description: "Microsoft's extensible editor — huge ecosystem of extensions"
    category: "editor"
    platforms:
      mac: "brew install --cask visual-studio-code"
      ubuntu: "sudo snap install code --classic"
      linux: "sudo snap install code --classic"
      windows: "winget install Microsoft.VisualStudioCode"

  - name: "zed"
    description: "GPU-accelerated editor built in Rust — blazing fast on large files"
    category: "editor"
    platforms:
      mac: "brew install --cask zed"
      ubuntu: "curl -fsSL https://zed.dev/install.sh | sh"
      linux: "curl -fsSL https://zed.dev/install.sh | sh"
      windows: "winget install Zed.Zed"

  - name: "nvim"
    description: "Highly configurable terminal editor — Lua plugins, LSP, treesitter"
    category: "editor"
    platforms:
      mac: "brew install neovim"
      ubuntu: "sudo apt-get install -y neovim"
      linux: "sudo apt-get install -y neovim"
      windows: "winget install Neovim.Neovim"

  - name: "subl"
    description: "Lightweight, fast text editor — great for quick edits"
    category: "editor"
    platforms:
      mac: "brew install --cask sublime-text"
      ubuntu: "sudo snap install sublime-text --classic"
      linux: "sudo snap install sublime-text --classic"
      windows: "winget install SublimeHQ.SublimeText.4"

  # ── Containers ──
  - name: "docker"
    description: "Build, ship, and run apps in containers (paid license for orgs >250)"
    category: "containers"
    platforms:
      mac: "brew install --cask docker"
      ubuntu: "curl -fsSL https://get.docker.com | sh"
      linux: "curl -fsSL https://get.docker.com | sh"
      windows: "winget install Docker.DockerDesktop"

  - name: "rancher"
    description: "Free Docker/k8s desktop — no license fees, includes containerd + k3s"
    category: "containers"
    platforms:
      mac: "brew install --cask rancher"
      ubuntu: "sudo snap install rancher-desktop"
      linux: "sudo snap install rancher-desktop"
      windows: "winget install suse.RancherDesktop"

  - name: "podman"
    description: "Run containers without a daemon — drop-in Docker replacement"
    category: "containers"
    platforms:
      mac: "brew install podman"
      ubuntu: "sudo apt install -y podman"
      linux: "sudo apt install -y podman"
      windows: "winget install RedHat.Podman"

  # ── Runtimes & Language Managers ──
  - name: "nvm"
    description: "Install and switch between Node.js versions per project"
    category: "runtime"
    platforms:
      mac: "curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash"
      ubuntu: "curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash"
      linux: "curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash"
      windows: "winget install CoreyButler.NVMforWindows"

  - name: "pyenv"
    description: "Install and switch between Python versions — isolate from system Python"
    category: "runtime"
    platforms:
      mac: "brew install pyenv"
      ubuntu: "curl https://pyenv.run | bash"
      linux: "curl https://pyenv.run | bash"

  - name: "sdk"
    description: "Manage Java, Gradle, Maven, Kotlin versions — one tool for the JVM ecosystem"
    category: "runtime"
    platforms:
      mac: "curl -s https://get.sdkman.io | bash"
      ubuntu: "curl -s https://get.sdkman.io | bash"
      linux: "curl -s https://get.sdkman.io | bash"

  - name: "dotnet"
    description: "Build C#, F#, and .NET apps — includes runtime, compiler, and CLI"
    category: "runtime"
    platforms:
      mac: "brew install dotnet-sdk"
      ubuntu: "sudo apt install -y dotnet-sdk-8.0"
      linux: "sudo apt install -y dotnet-sdk-8.0"
      windows: "winget install Microsoft.DotNet.SDK.8"

  - name: "rustup"
    description: "Install Rust and switch between stable/nightly toolchains"
    category: "runtime"
    platforms:
      mac: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh"
      ubuntu: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh"
      linux: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh"
      windows: "winget install Rustlang.Rustup"

  - name: "go"
    description: "Compiled language for cloud services, CLIs, and systems — fast builds"
    category: "runtime"
    platforms:
      mac: "brew install go"
      ubuntu: "sudo snap install go --classic"
      linux: "sudo snap install go --classic"
      windows: "winget install GoLang.Go"

  - name: "perl"
    description: "Text processing, sysadmin scripting, and legacy system glue"
    category: "runtime"
    platforms:
      mac: "brew install perl"
      ubuntu: "sudo apt install -y perl"
      linux: "sudo apt install -y perl"
      windows: "winget install StrawberryPerl.StrawberryPerl"

  - name: "rbenv"
    description: "Install and switch between Ruby versions per project"
    category: "runtime"
    platforms:
      mac: "brew install rbenv"
      ubuntu: "sudo apt install -y rbenv"
      linux: "sudo apt install -y rbenv"

  # ── Cloud CLIs ──
  - name: "aws"
    description: "Manage AWS resources — S3, EC2, Lambda, IAM, and 200+ services"
    category: "cloud"
    platforms:
      mac: "brew install awscli"
      ubuntu: "sudo apt install -y awscli"
      linux: "sudo apt install -y awscli"
      windows: "winget install Amazon.AWSCLI"

  - name: "az"
    description: "Manage Azure resources — VMs, App Service, AKS, and more"
    category: "cloud"
    platforms:
      mac: "brew install azure-cli"
      ubuntu: "curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash"
      linux: "curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash"
      windows: "winget install Microsoft.AzureCLI"

  - name: "gcloud"
    description: "Manage GCP resources — Compute, GKE, Cloud Run, BigQuery, and more"
    category: "cloud"
    platforms:
      mac: "brew install --cask google-cloud-sdk"
      ubuntu: "sudo snap install google-cloud-cli --classic"
      linux: "sudo snap install google-cloud-cli --classic"
      windows: "winget install Google.CloudSDK"

  - name: "terraform"
    description: "Define infrastructure as code — provision any cloud with HCL configs"
    category: "cloud"
    platforms:
      mac: "brew install terraform"
      ubuntu: "brew install terraform"
      linux: "brew install terraform"
      windows: "winget install Hashicorp.Terraform"

  - name: "pulumi"
    description: "Infrastructure as code using real languages — Python, TypeScript, Go, C#"
    category: "cloud"
    platforms:
      mac: "brew install pulumi"
      ubuntu: "curl -fsSL https://get.pulumi.com | sh"
      linux: "curl -fsSL https://get.pulumi.com | sh"
      windows: "winget install Pulumi.Pulumi"

  # ── Kubernetes ──
  - name: "kubectl"
    description: "Deploy, inspect, and manage workloads on any Kubernetes cluster"
    category: "kubernetes"
    platforms:
      mac: "brew install kubernetes-cli"
      ubuntu: "sudo snap install kubectl --classic"
      linux: "sudo snap install kubectl --classic"
      windows: "winget install Kubernetes.kubectl"

  - name: "helm"
    description: "Install and manage complex apps on Kubernetes with reusable charts"
    category: "kubernetes"
    platforms:
      mac: "brew install helm"
      ubuntu: "sudo snap install helm --classic"
      linux: "sudo snap install helm --classic"
      windows: "winget install Helm.Helm"

  - name: "k9s"
    description: "Navigate pods, logs, and resources in a terminal dashboard"
    category: "kubernetes"
    platforms:
      mac: "brew install k9s"
      ubuntu: "sudo snap install k9s"
      linux: "sudo snap install k9s"
      windows: "winget install Derailed.k9s"

  - name: "kubectx"
    description: "Switch between clusters and namespaces in one keystroke"
    category: "kubernetes"
    platforms:
      mac: "brew install kubectx"
      ubuntu: "sudo apt install -y kubectx"
      linux: "sudo apt install -y kubectx"

  - name: "stern"
    description: "Tail logs from multiple pods at once — filter by label, container, regex"
    category: "kubernetes"
    platforms:
      mac: "brew install stern"
      ubuntu: "brew install stern"
      linux: "brew install stern"

  - name: "kustomize"
    description: "Patch and overlay Kubernetes YAML without templates or Helm"
    category: "kubernetes"
    platforms:
      mac: "brew install kustomize"
      ubuntu: "sudo snap install kustomize"
      linux: "sudo snap install kustomize"

  - name: "skaffold"
    description: "Auto-rebuild and redeploy to Kubernetes as you code — dev inner loop"
    category: "kubernetes"
    platforms:
      mac: "brew install skaffold"
      ubuntu: "curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64 && sudo install skaffold /usr/local/bin/"
      linux: "curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64 && sudo install skaffold /usr/local/bin/"

  - name: "argocd"
    description: "GitOps continuous delivery — sync your cluster state from a git repo"
    category: "kubernetes"
    platforms:
      mac: "brew install argocd"
      ubuntu: "curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64 && sudo install argocd /usr/local/bin/"
      linux: "curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64 && sudo install argocd /usr/local/bin/"
