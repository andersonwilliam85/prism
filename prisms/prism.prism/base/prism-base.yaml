# Prism Base Configuration
# Applied to all environments by default

git_config:
  default_branch: "main"
  pull_rebase: true
  init_default_branch: "main"
  core_autocrlf: "input"

workspace:
  root: "~/workspace"
  structure:
    - projects
    - experiments
    - learning
    - archived
    - docs
    - tooling

# Tool definitions live in tool-registry.yaml
# Sub-prisms can define their own tool-registry.yaml to add/override tools
tool_registry_file: "tool-registry.yaml"

tools_required:
  - "git"

tools_optional:
  - "cursor"
  - "code"
  - "zed"
  - "nvim"
  - "subl"
  - "docker"
  - "rancher"
  - "podman"
  - "nvm"
  - "pyenv"
  - "sdk"
  - "dotnet"
  - "rustup"
  - "go"
  - "perl"
  - "rbenv"
  - "aws"
  - "az"
  - "gcloud"
  - "terraform"
  - "pulumi"
  - "kubectl"
  - "helm"
  - "k9s"
  - "kubectx"
  - "stern"
  - "kustomize"
  - "skaffold"
  - "argocd"
  - "gh"
  - "httpie"
  - "jq"
  - "tmux"
  - "ripgrep"
  - "fd"
  - "fzf"
  - "lazygit"
