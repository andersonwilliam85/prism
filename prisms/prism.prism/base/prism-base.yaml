# Prism Base Configuration
# Applied to all environments by default

git_config:
  default_branch: "main"
  pull_rebase: true
  init_default_branch: "main"
  core_autocrlf: "input"

workspace:
  root: "~/workspace"
  structure:
    - projects
    - experiments
    - learning
    - archived
    - docs
    - tooling

tools_required:
  - name: "git"
    description: "Version control"
    platforms:
      mac: "brew install git"
      ubuntu: "sudo apt-get install -y git"
      linux: "sudo apt-get install -y git"

# Editors — user picks one (or none) on the tools page
tools_optional:
  - name: "cursor"
    description: "AI-powered code editor"
    category: "editor"
    platforms:
      mac: "brew install --cask cursor"
      ubuntu: "curl -fsSL https://www.cursor.com/download/linux | sh"
      linux: "curl -fsSL https://www.cursor.com/download/linux | sh"
      windows: "winget install Anysphere.Cursor"

  - name: "code"
    description: "Visual Studio Code"
    category: "editor"
    platforms:
      mac: "brew install --cask visual-studio-code"
      ubuntu: "sudo snap install code --classic"
      linux: "sudo snap install code --classic"
      windows: "winget install Microsoft.VisualStudioCode"

  - name: "zed"
    description: "High-performance code editor"
    category: "editor"
    platforms:
      mac: "brew install --cask zed"
      ubuntu: "curl -fsSL https://zed.dev/install.sh | sh"
      linux: "curl -fsSL https://zed.dev/install.sh | sh"
      windows: "winget install Zed.Zed"

  - name: "nvim"
    description: "Neovim"
    category: "editor"
    platforms:
      mac: "brew install neovim"
      ubuntu: "sudo apt-get install -y neovim"
      linux: "sudo apt-get install -y neovim"
      windows: "winget install Neovim.Neovim"

  - name: "subl"
    description: "Sublime Text"
    category: "editor"
    platforms:
      mac: "brew install --cask sublime-text"
      ubuntu: "sudo snap install sublime-text --classic"
      linux: "sudo snap install sublime-text --classic"
      windows: "winget install SublimeHQ.SublimeText.4"
