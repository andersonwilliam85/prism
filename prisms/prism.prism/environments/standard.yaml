# Standard environment — tools + workspace
# Good default for most developers

tools_required:
  - name: "git"
    category: "core"
  - name: "nvm"
    category: "runtime"
  - name: "docker"
    category: "devops"

tools_optional:
  - name: "gh"
    category: "cli"
  - name: "httpie"
    category: "cli"
  - name: "jq"
    category: "cli"

environment:
  workspace_root: "~/projects"
  directories:
    - "~/projects"
    - "~/projects/personal"
    - "~/projects/freelance"

git:
  default_branch: "main"
  pull_rebase: true
  auto_setup_remote: true

repositories: []
