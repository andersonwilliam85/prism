# Full-featured environment — structured workspace + multiple runtimes
# For developers who want an organized, batteries-included setup

tools_required:
  - name: "git"
    category: "core"
  - name: "nvm"
    description: "Install and switch between Node.js versions per project"
    category: "runtime"
  - name: "docker"
    description: "Build, ship, and run apps in containers"
    category: "containers"

tools_optional:
  - name: "gh"
    description: "Create PRs, manage issues, and run Actions from your terminal"
    category: "cli"
  - name: "httpie"
    description: "Test APIs from the terminal with human-readable output"
    category: "cli"
  - name: "jq"
    description: "Slice, filter, and transform JSON on the command line"
    category: "cli"
  - name: "tmux"
    description: "Split your terminal into panes, detach and reattach sessions"
    category: "cli"
  - name: "ripgrep"
    description: "Search file contents recursively — 10x faster than grep"
    category: "cli"
  - name: "fd"
    description: "Find files by name — faster, friendlier alternative to find"
    category: "cli"
  - name: "fzf"
    description: "Fuzzy search anything — files, history, branches, processes"
    category: "cli"
  - name: "lazygit"
    description: "Full git workflow in a terminal UI — stage, commit, rebase visually"
    category: "cli"

environment:
  workspace_root: "~/dev"
  directories:
    - "~/dev"
    - "~/dev/projects"
    - "~/dev/projects/active"
    - "~/dev/projects/archive"
    - "~/dev/projects/experiments"
    - "~/dev/freelance"
    - "~/dev/freelance/active"
    - "~/dev/freelance/archive"
    - "~/dev/oss"
    - "~/dev/learning"
    - "~/dev/dotfiles"
    - "~/dev/scripts"
    - "~/dev/templates"

git:
  default_branch: "main"
  pull_rebase: true
  auto_setup_remote: true
  aliases:
    co: "checkout"
    br: "branch"
    ci: "commit"
    st: "status"
    lg: "log --oneline --graph --decorate"
    unstage: "reset HEAD --"
    last: "log -1 HEAD"

repositories: []
