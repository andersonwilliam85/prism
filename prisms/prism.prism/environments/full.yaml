# Full-featured environment — structured workspace + multiple runtimes
# For developers who want an organized, batteries-included setup

tools_required:
  - name: "git"
    category: "core"
  - name: "nvm"
    category: "runtime"
  - name: "docker"
    category: "containers"

tools_optional:
  - name: "gh"
    category: "cli"
  - name: "httpie"
    category: "cli"
  - name: "jq"
    category: "cli"
  - name: "tmux"
    category: "cli"
  - name: "ripgrep"
    category: "cli"
  - name: "fd"
    category: "cli"
  - name: "fzf"
    category: "cli"
  - name: "lazygit"
    category: "cli"

environment:
  workspace_root: "~/dev"
  directories:
    - "~/dev"
    - "~/dev/projects"
    - "~/dev/projects/active"
    - "~/dev/projects/archive"
    - "~/dev/projects/experiments"
    - "~/dev/freelance"
    - "~/dev/freelance/active"
    - "~/dev/freelance/archive"
    - "~/dev/oss"
    - "~/dev/learning"
    - "~/dev/dotfiles"
    - "~/dev/scripts"
    - "~/dev/templates"

git:
  default_branch: "main"
  pull_rebase: true
  auto_setup_remote: true
  aliases:
    co: "checkout"
    br: "branch"
    ci: "commit"
    st: "status"
    lg: "log --oneline --graph --decorate"
    unstage: "reset HEAD --"
    last: "log -1 HEAD"

repositories: []
