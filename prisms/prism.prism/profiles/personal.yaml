# Personal / Freelance Profile
# Full-fledged setup for solo developers and freelancers

git_config:
  default_branch: "main"
  pull_rebase: true
  auto_setup_remote: true
  credential_helper: "store"

ssh:
  generate_key: true
  key_type: "ed25519"
  add_to_agent: true

workspace:
  directories:
    - "projects"
    - "projects/personal"
    - "projects/clients"
    - "scripts"
    - ".config"

shell:
  aliases:
    - alias: "gs"
      command: "git status"
    - alias: "gp"
      command: "git push"
    - alias: "gl"
      command: "git log --oneline -20"
    - alias: "gd"
      command: "git diff"
    - alias: "gc"
      command: "git commit"
    - alias: "gb"
      command: "git branch"
    - alias: "gco"
      command: "git checkout"

tools_required:
  - "git"
  - "curl"

tools_optional:
  - "docker"
  - "gh"
  - "jq"

