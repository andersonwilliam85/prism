# Personal / Freelance Profile
# Full-fledged setup for solo developers and freelancers

git_config:
  default_branch: "main"
  pull_rebase: true
  auto_setup_remote: true
  credential_helper: "store"

ssh:
  generate_key: true
  key_type: "ed25519"
  add_to_agent: true

workspace:
  directories:
    - "projects"
    - "projects/personal"
    - "projects/clients"
    - "scripts"
    - ".config"

shell:
  aliases:
    - alias: "gs"
      command: "git status"
    - alias: "gp"
      command: "git push"
    - alias: "gl"
      command: "git log --oneline -20"
    - alias: "gd"
      command: "git diff"
    - alias: "gc"
      command: "git commit"
    - alias: "gb"
      command: "git branch"
    - alias: "gco"
      command: "git checkout"

tools_required:
  - name: "git"
    description: "Version control"
    category: "core"
    platforms:
      mac: "brew install git"
      ubuntu: "sudo apt-get install -y git"
      linux: "sudo apt-get install -y git"
      windows: "winget install Git.Git"

  - name: "curl"
    description: "HTTP client"
    category: "core"
    platforms:
      mac: "brew install curl"
      ubuntu: "sudo apt-get install -y curl"
      linux: "sudo apt-get install -y curl"
      windows: "winget install cURL.cURL"

  - name: "node"
    description: "Node.js runtime"
    category: "runtime"
    platforms:
      mac: "brew install node"
      ubuntu: "curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - && sudo apt-get install -y nodejs"
      linux: "curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - && sudo apt-get install -y nodejs"
      windows: "winget install OpenJS.NodeJS.LTS"

  - name: "python3"
    description: "Python interpreter"
    category: "runtime"
    platforms:
      mac: "brew install python@3.12"
      ubuntu: "sudo apt-get install -y python3 python3-pip python3-venv"
      linux: "sudo apt-get install -y python3 python3-pip python3-venv"
      windows: "winget install Python.Python.3.12"

tools_optional:
  - name: "docker"
    description: "Container runtime"
    category: "devops"
    platforms:
      mac: "brew install --cask docker"
      ubuntu: "curl -fsSL https://get.docker.com | sh"
      linux: "curl -fsSL https://get.docker.com | sh"
      windows: "winget install Docker.DockerDesktop"

  - name: "gh"
    description: "GitHub CLI"
    category: "cli"
    platforms:
      mac: "brew install gh"
      ubuntu: "sudo apt-get install -y gh"
      linux: "sudo apt-get install -y gh"
      windows: "winget install GitHub.cli"

  - name: "jq"
    description: "JSON processor"
    category: "cli"
    platforms:
      mac: "brew install jq"
      ubuntu: "sudo apt-get install -y jq"
      linux: "sudo apt-get install -y jq"
      windows: "winget install jqlang.jq"

