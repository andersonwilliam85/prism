# Small Team Profile
# Shared conventions and tooling for small teams

git_config:
  default_branch: "main"
  pull_rebase: true
  auto_setup_remote: true
  commit_template: ".gitmessage"
  hooks:
    pre_commit: true
    commit_msg: true

ssh:
  generate_key: true
  key_type: "ed25519"
  add_to_agent: true

workspace:
  directories:
    - "projects"
    - "projects/team"
    - "scripts"
    - "docs"
    - ".config"

shell:
  aliases:
    - alias: "gs"
      command: "git status"
    - alias: "gp"
      command: "git push"
    - alias: "gl"
      command: "git log --oneline -20"
    - alias: "gpr"
      command: "gh pr create"
    - alias: "gprl"
      command: "gh pr list"

code_quality:
  linting: true
  formatting: true
  pre_commit_hooks: true

tools_required:
  - "git"
  - "curl"
  - "gh"

tools_optional:
  - "docker"
  - "jq"
