# Enterprise Profile
# Corporate environment with compliance, security, and multi-tier setup

git_config:
  default_branch: "main"
  pull_rebase: true
  auto_setup_remote: true
  commit_template: ".gitmessage"
  sign_commits: true
  hooks:
    pre_commit: true
    commit_msg: true
    pre_push: true

ssh:
  generate_key: true
  key_type: "ed25519"
  add_to_agent: true
  config_entries:
    - host: "github.com"
      identity_file: "~/.ssh/id_ed25519_work"

proxy:
  http: ""
  https: ""
  no_proxy: "localhost,127.0.0.1,.internal.company.com"

workspace:
  directories:
    - "projects"
    - "projects/core"
    - "projects/services"
    - "projects/libraries"
    - "scripts"
    - "docs"
    - ".config"
    - ".certs"

shell:
  aliases:
    - alias: "gs"
      command: "git status"
    - alias: "gp"
      command: "git push"
    - alias: "gl"
      command: "git log --oneline -20"
    - alias: "gpr"
      command: "gh pr create"
    - alias: "gprl"
      command: "gh pr list"

code_quality:
  linting: true
  formatting: true
  pre_commit_hooks: true
  security_scanning: true

security:
  credential_storage: "keychain"
  rotate_keys_days: 90
  audit_logging: true

tools_required:
  - "git"
  - "curl"
  - "gh"
  - "docker"

tools_optional:
  - "jq"
  - "aws"
  - "kubectl"
