# Full-featured environment — structured workspace + multiple runtimes
# For developers who want an organized, batteries-included setup

tools_required:
  - git
  - vscode
  - node
  - docker
  - python3

tools_optional:
  - gh
  - httpie
  - jq
  - tmux
  - ripgrep
  - fd
  - fzf
  - lazygit
  - go
  - rustc

environment:
  workspace_root: "~/dev"
  directories:
    - "~/dev"
    - "~/dev/projects"
    - "~/dev/projects/active"
    - "~/dev/projects/archive"
    - "~/dev/projects/experiments"
    - "~/dev/freelance"
    - "~/dev/freelance/active"
    - "~/dev/freelance/archive"
    - "~/dev/oss"
    - "~/dev/learning"
    - "~/dev/dotfiles"
    - "~/dev/scripts"
    - "~/dev/templates"

git:
  default_branch: "main"
  pull_rebase: true
  auto_setup_remote: true
  aliases:
    co: "checkout"
    br: "branch"
    ci: "commit"
    st: "status"
    lg: "log --oneline --graph --decorate"
    unstage: "reset HEAD --"
    last: "log -1 HEAD"

repositories: []
