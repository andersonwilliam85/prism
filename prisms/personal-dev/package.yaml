# ============================================================================
# PERSONAL DEV PRISM
# ============================================================================
# Perfect for freelancers, indie developers, and personal projects.
# Choose your complexity level: from a minimal setup to a full-featured
# structured environment with organized project folders.

package:
  name: "personal-dev-prism"
  version: "2.0.0"
  description: "Personal developer prism — from minimal to full-featured, your way"
  author: "Prism Community"
  homepage: "https://github.com/prism/personal-config"
  support:
    github: "https://github.com/prism/personal-config/issues"
    community: "https://discord.gg/prism"

  type: "personal"

  requires:
    onboarding_version: ">=1.0.0"
    python_version: ">=3.8"

# PRISM META-CONFIGURATION
prism_config:
  theme: "ocean"
  theme_options:
    - "ocean"
    - "purple"
    - "forest"
    - "sunset"
    - "midnight"
    - "indie"
  custom_themes:
    - id: "indie"
      name: "Indie Dev"
      gradient_1: "#0093e9"
      gradient_2: "#80d0c7"
      gradient_3: "#43e97b"
      gradient_4: "#38f9d7"
      gradient_5: "#00c6fb"

  sources:
    - url: "local"
      name: "Built-in Prisms"
      type: "local"

  branding:
    name: "Personal Dev Prism"
    tagline: "Your environment, your way"
    primary_color: "#0093e9"
    secondary_color: "#80d0c7"

# BUNDLED SUB-PRISMS
# base is required; user picks environment complexity and git platform
bundled_prisms:
  base:
    - id: "personal-base"
      name: "Personal Base"
      description: "Core personal developer setup"
      required: true
      config: "base/personal-dev.yaml"

  # Environment complexity — simple to full-featured
  environment:
    - id: "minimal"
      name: "Minimal"
      description: "Just git config and SSH key — nothing else. For devs who know what they want."
      config: "environments/minimal.yaml"

    - id: "standard"
      name: "Standard"
      description: "Git, SSH, common tools (VS Code, Docker, Node), and a ~/projects workspace."
      config: "environments/standard.yaml"
      tools:
        - vscode
        - docker
        - node
        - git

    - id: "full"
      name: "Full-Featured"
      description: "Structured workspace with organized folders, dotfiles, multiple language runtimes, and dev utilities."
      config: "environments/full.yaml"
      tools:
        - vscode
        - docker
        - node
        - python3
        - git
        - gh
        - jq
        - httpie

  # Git platform
  profiles:
    - id: "github"
      name: "GitHub"
      description: "GitHub.com for personal projects"
      config: "profiles/github.yaml"

    - id: "gitlab"
      name: "GitLab"
      description: "GitLab.com or self-hosted GitLab"
      config: "profiles/gitlab.yaml"

    - id: "bitbucket"
      name: "Bitbucket"
      description: "Bitbucket for repositories"
      config: "profiles/bitbucket.yaml"

    - id: "gitea"
      name: "Gitea (Self-hosted)"
      description: "Self-hosted Gitea instance"
      config: "profiles/gitea.yaml"

    - id: "multi"
      name: "Multiple Platforms"
      description: "Multiple git platforms simultaneously"
      config: "profiles/multi-platform.yaml"

# SETUP CONFIGURATION
setup:
  install:
    target_dir: "config/"

    files:
      - source: "welcome.yaml"
        dest: "config/welcome.yaml"
        description: "Welcome message for personal devs"
      - source: "resources.yaml"
        dest: "config/resources.yaml"
        description: "Free developer resources"

    directories:
      - source: "base/"
        dest: "config/base/"
        description: "Base personal dev config"
      - source: "environments/"
        dest: "config/environments/"
        description: "Environment complexity configs"
      - source: "profiles/"
        dest: "config/profiles/"
        description: "Pre-configured platform profiles"

  rollback:
    enabled: true
    persist_state: true

  post_install:
    message: |
      💎 Personal Dev prism installed!

      Your environment is ready. Here's what was set up based on your choices:

        Minimal   → Git config + SSH key
        Standard  → + tools, ~/projects workspace
        Full      → + structured folders, dotfiles, multiple runtimes

      Next steps:
      1. Add SSH key to your git provider
      2. Start coding! 🚀

# User info fields
user_info_fields:
  - id: "name"
    label: "Your Name"
    type: "text"
    required: true
    placeholder: "Jane Developer"
    description: "Your name (for git commits)"

  - id: "email"
    label: "Email"
    type: "email"
    required: true
    placeholder: "jane@example.com"
    description: "Your email (for git commits)"

  - id: "username"
    label: "Username"
    type: "text"
    required: true
    placeholder: "janedev"
    description: "Your username on chosen git platform"

  - id: "environment"
    label: "Environment Complexity"
    type: "select"
    required: true
    options:
      - "Minimal"
      - "Standard"
      - "Full-Featured"
    description: "How much structure do you want?"

  - id: "primary_language"
    label: "Primary Language"
    type: "select"
    required: false
    depends_on: "environment"
    options:
      - "JavaScript/TypeScript"
      - "Python"
      - "Go"
      - "Rust"
      - "Java"
      - "Other"
    option_map:
      Minimal:
        - "N/A"
      Standard:
        - "JavaScript/TypeScript"
        - "Python"
        - "Other"
      Full-Featured:
        - "JavaScript/TypeScript"
        - "Python"
        - "Go"
        - "Rust"
        - "Java"
        - "Other"

  - id: "portfolio_url"
    label: "Portfolio/Website"
    type: "url"
    required: false
    placeholder: "https://janedev.com"
    description: "Your portfolio or personal website (optional)"

distribution:
  local:
    path: "prisms/personal-dev/"
    discoverable: true

  git:
    url: "https://github.com/prism/personal-config"
    branch: "main"

metadata:
  tags:
    - recommended
    - personal
    - freelance
    - indie
    - small-team
    - no-corporate
    - github
    - gitlab
    - bitbucket
    - gitea

  company_size: "personal"
  regions: ["Global"]
  last_updated: "2026-03-10"
  maintainers:
    - "Prism Community"
