# ============================================================================
# CORE PRISM - DEFAULT CONFIGURATION
# ============================================================================
# The minimal base configuration that works for everyone
# Use this as a starting point or template

package:
  name: "core-prism"
  version: "1.0.0"
  description: "Core prism - minimal default configuration for any developer"
  author: "Prism Community"
  homepage: "https://github.com/prism/core"
  support:
    github: "https://github.com/prism/core/issues"
    community: "https://discord.gg/prism"
  
  type: "core"  # Base configuration
  
  requires:
    onboarding_version: ">=1.0.0"
    python_version: ">=3.8"

# PRISM META-CONFIGURATION
# This configures Prism itself (theme, sources, registry)
prism_config:
  theme: "ocean"  # Default theme (ocean, purple, forest, sunset, midnight)
  
  sources:
    - url: "local"
      name: "Built-in Prisms"
      type: "local"
  
  npm_registry: ""  # Empty = use default npmjs.org
  unpkg_url: ""     # Empty = use default unpkg.com

# SETUP CONFIGURATION
# What gets installed in the dev environment
setup:
  install:
    target_dir: "config/"
    
    files:
      - source: "welcome.yaml"
        dest: "config/welcome.yaml"
        description: "Welcome message"
      
      - source: "resources.yaml"
        dest: "config/resources.yaml"
        description: "Useful resources"
    
    directories:
      - source: "base/"
        dest: "config/base/"
        description: "Base configuration files"
  
  post_install:
    message: |
      ✅ Core prism installed!
      
      This is the minimal base configuration.
      You can customize it or install additional prisms.
      
      Next steps:
      1. Open the hamburger menu (≡)
      2. Add custom prism sources if needed
      3. Choose your preferred theme
      4. Start developing! 🚀

# User info fields (minimal)
user_info_fields:
  - id: "name"
    label: "Your Name"
    type: "text"
    required: true
    placeholder: "Taylor Developer"
    description: "Your full name"
  
  - id: "email"
    label: "Email"
    type: "email"
    required: true
    placeholder: "taylor@example.com"
    description: "Your email address"
  
  - id: "git_username"
    label: "Git Username"
    type: "text"
    required: true
    placeholder: "taylordev"
    description: "Your git username"

# Package contents
contents:
  base_config: "base/core.yaml"
  welcome_page: "welcome.yaml"
  resources: "resources.yaml"

# Distribution
distribution:
  local:
    path: "prisms/core.prism/"
    discoverable: true
  
  git:
    url: "https://github.com/prism/core"
    branch: "main"

# Metadata
metadata:
  tags:
    - core
    - default
    - minimal
    - recommended
    - universal
  
  keywords:
    - base
    - starter
    - template
    - minimal
  
  company_size: "any"
  regions: ["Global"]
  
  last_updated: "2026-03-04"
  maintainers:
    - "Prism Community"
