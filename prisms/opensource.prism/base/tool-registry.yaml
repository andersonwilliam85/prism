# Tool Registry — tools for the Open Source prism that are NOT in the base registry.
# Tools defined here extend the base tool registry from prism.prism.
# Only tools absent from prism.prism/base/tool-registry.yaml belong here.

# ---------------------------------------------------------------------------
# GPG — commit signing
# ---------------------------------------------------------------------------
gpg:
  label: GnuPG
  summary: Commit and tag signing
  description: Sign git commits and tags for verified badges on GitHub — required by many OSS projects
  category: security
  platforms:
    mac: brew install gnupg
    ubuntu: sudo apt-get install -y gnupg
    linux: sudo apt-get install -y gnupg
    windows: winget install GnuPG.GnuPG
  uninstall:
    mac: brew uninstall gnupg
    ubuntu: sudo apt-get remove -y gnupg
    linux: sudo apt-get remove -y gnupg
    windows: winget uninstall GnuPG.GnuPG

# ---------------------------------------------------------------------------
# CODE QUALITY
# ---------------------------------------------------------------------------
pre-commit:
  label: pre-commit
  summary: Git hook framework
  description: Run linters, formatters, and checks automatically on every commit via configurable hooks
  category: quality
  platforms:
    mac: brew install pre-commit
    ubuntu: pip install pre-commit
    linux: pip install pre-commit
    windows: pip install pre-commit
  uninstall:
    mac: brew uninstall pre-commit
    ubuntu: pip uninstall -y pre-commit
    linux: pip uninstall -y pre-commit
    windows: pip uninstall -y pre-commit

shellcheck:
  label: ShellCheck
  summary: Shell script linter
  description: Static analysis for bash/sh scripts — catches common bugs, quoting issues, and portability problems
  category: quality
  platforms:
    mac: brew install shellcheck
    ubuntu: sudo apt-get install -y shellcheck
    linux: sudo apt-get install -y shellcheck
    windows: winget install koalaman.shellcheck
  uninstall:
    mac: brew uninstall shellcheck
    ubuntu: sudo apt-get remove -y shellcheck
    linux: sudo apt-get remove -y shellcheck
    windows: winget uninstall koalaman.shellcheck

actionlint:
  label: actionlint
  summary: GitHub Actions linter
  description: Validate GitHub Actions workflow YAML — catches syntax errors, type mismatches, and shell issues before push
  category: quality
  platforms:
    mac: brew install actionlint
    ubuntu: go install github.com/rhysd/actionlint/cmd/actionlint@latest
    linux: go install github.com/rhysd/actionlint/cmd/actionlint@latest
  uninstall:
    mac: brew uninstall actionlint

delta:
  label: delta
  summary: Better git diffs
  description: Syntax-highlighted, side-by-side diffs with line numbers — drop-in replacement for git's pager
  category: quality
  platforms:
    mac: brew install git-delta
    ubuntu: brew install git-delta
    linux: brew install git-delta
    windows: winget install dandavison.delta
  uninstall:
    mac: brew uninstall git-delta
    ubuntu: brew uninstall git-delta
    linux: brew uninstall git-delta
    windows: winget uninstall dandavison.delta

# ---------------------------------------------------------------------------
# SECURITY SCANNING
# ---------------------------------------------------------------------------
trivy:
  label: Trivy
