  description: Scan container images, filesystems, and IaC for CVEs, secrets, and misconfigurations
  category: security
  platforms:
    mac: brew install trivy
    ubuntu: sudo apt-get install -y trivy
    linux: sudo apt-get install -y trivy
  uninstall:
    mac: brew uninstall trivy
    ubuntu: sudo apt-get remove -y trivy
    linux: sudo apt-get remove -y trivy

hadolint:
  label: Hadolint
  summary: Dockerfile linter
  description: Lint Dockerfiles against best practices — catches inefficient layers, missing pinning, and security issues
  category: security
  platforms:
    mac: brew install hadolint
    ubuntu: brew install hadolint
    linux: brew install hadolint
    windows: winget install hadolint.hadolint
  uninstall:
    mac: brew uninstall hadolint
    ubuntu: brew uninstall hadolint
    linux: brew uninstall hadolint
    windows: winget uninstall hadolint.hadolint

# ---------------------------------------------------------------------------
# DOCUMENTATION
# ---------------------------------------------------------------------------
mkdocs:
  label: MkDocs
  summary: Project documentation
  description: Build static documentation sites from Markdown — Material theme, search, versioning, GitHub Pages deploy
  category: docs
  platforms:
    mac: pip install mkdocs mkdocs-material
    ubuntu: pip install mkdocs mkdocs-material
    linux: pip install mkdocs mkdocs-material
    windows: pip install mkdocs mkdocs-material
  uninstall:
    mac: pip uninstall -y mkdocs mkdocs-material
    ubuntu: pip uninstall -y mkdocs mkdocs-material
    linux: pip uninstall -y mkdocs mkdocs-material
    windows: pip uninstall -y mkdocs mkdocs-material

# ---------------------------------------------------------------------------
# RELEASE AND CHANGELOG
# ---------------------------------------------------------------------------
git-cliff:
  label: git-cliff
  summary: Changelog generator
  description: Generate changelogs from Conventional Commits — customizable templates, integrates with release workflows
  category: release
  platforms:
    mac: brew install git-cliff
    ubuntu: cargo install git-cliff
    linux: cargo install git-cliff
    windows: cargo install git-cliff
  uninstall:
    mac: brew uninstall git-cliff
    ubuntu: cargo uninstall git-cliff
    linux: cargo uninstall git-cliff
    windows: cargo uninstall git-cliff

cargo-release:
  label: cargo-release
  summary: Rust release automation
  description: Automate version bumps, changelog updates, tagging, and publishing for Rust crates
  category: release
  platforms:
    mac: cargo install cargo-release
    ubuntu: cargo install cargo-release
    linux: cargo install cargo-release
    windows: cargo install cargo-release
  uninstall:
    mac: cargo uninstall cargo-release
    ubuntu: cargo uninstall cargo-release
    linux: cargo uninstall cargo-release
    windows: cargo uninstall cargo-release

# ---------------------------------------------------------------------------
# LANGUAGES / RUNTIMES (not in base registry)
# ---------------------------------------------------------------------------
python3:
  label: Python 3
  summary: General-purpose language
  description: Interpreted language for scripting, automation, data science, and web backends
  category: runtime
  platforms:
    mac: brew install python3
    ubuntu: sudo apt-get install -y python3 python3-pip python3-venv
    linux: sudo apt-get install -y python3 python3-pip python3-venv
    windows: winget install Python.Python.3.12
  uninstall:
    mac: brew uninstall python3
    ubuntu: sudo apt-get remove -y python3
    linux: sudo apt-get remove -y python3
    windows: winget uninstall Python.Python.3.12

nodejs:
  label: Node.js
  summary: JavaScript runtime
  description: Server-side JavaScript runtime — run JS outside the browser, power APIs and tooling
  category: runtime
  platforms:
    mac: brew install node
    ubuntu: sudo apt-get install -y nodejs
    linux: sudo apt-get install -y nodejs
    windows: winget install OpenJS.NodeJS
  uninstall:
    mac: brew uninstall node
    ubuntu: sudo apt-get remove -y nodejs
    linux: sudo apt-get remove -y nodejs
    windows: winget uninstall OpenJS.NodeJS

vscode:
  label: VS Code
  summary: Extensible editor
  description: Microsoft's extensible editor — huge ecosystem of extensions
  category: editor
  platforms:
    mac: brew install --cask visual-studio-code
    ubuntu: sudo snap install code --classic
    linux: sudo snap install code --classic
    windows: winget install Microsoft.VisualStudioCode
  uninstall:
    mac: brew uninstall --cask visual-studio-code
    ubuntu: sudo snap remove code
    linux: sudo snap remove code
    windows: winget uninstall Microsoft.VisualStudioCode
