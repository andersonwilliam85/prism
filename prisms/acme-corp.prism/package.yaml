# ============================================================================
# ACME CORP PRISM - MID-SIZE COMPANY DEVELOPMENT ENVIRONMENT
# ============================================================================
# Acme Corp: ~200 engineers, growing fast, moving from monolith to
# microservices, standardizing on AWS, establishing CI/CD and shared
# conventions as the team scales.

package:
  name: "acme-corp-prism"
  version: "2.0.0"
  description: "Acme Corp prism — growing engineering org standardizing on microservices, AWS, and CI/CD"
  author: "Acme Corp Platform Team"
  homepage: "https://dev.acmecorp.com"
  support:
    email: "platform-team@acmecorp.com"
    slack: "#platform-support"

  type: "company"

  requires:
    onboarding_version: ">=1.0.0"
    python_version: ">=3.10"

# PRISM META-CONFIGURATION
prism_config:
  theme: "midnight"
  theme_options:
    - "midnight"
    - "ocean"
    - "acme"
  custom_themes:
    - id: "acme"
      name: "ACME Brand"
      gradient_1: "#FF6B35"
      gradient_2: "#E85D26"
      gradient_3: "#004E89"
      gradient_4: "#1A6FB5"
      gradient_5: "#2E8BC0"

  sources:
    - url: "local"
      name: "Built-in Prisms"
      type: "local"

  # Internal npm registry (recently set up)
  npm_registry: "https://npm.acmecorp.com"
  docker_registry: "ecr.acmecorp.com"

  branding:
    name: "Acme Developer Hub"
    tagline: "Build. Ship. Iterate."
    primary_color: "#FF6B35"
    secondary_color: "#004E89"

# BUNDLED SUB-PRISMS
# Hierarchy: base (required) -> team (pick one)
bundled_prisms:
  base:
    - id: "acme-base"
      name: "Acme Corp Base"
      description: "Git conventions, AWS auth, Docker setup, shared tooling"
      required: true
      config: "base/acme-corp.yaml"

  teams:
    - id: "platform-team"
      name: "Platform Team"
      description: "Infrastructure, CI/CD, developer experience, cloud"
      config: "teams/platform-team.yaml"

    - id: "backend-team"
      name: "Backend Team"
      description: "APIs, services, database, the monolith-to-microservices migration"
      config: "teams/backend-team.yaml"

    - id: "frontend-team"
      name: "Frontend Team"
      description: "Web app, design system, customer-facing UI"
      config: "teams/frontend-team.yaml"

    - id: "data-team"
      name: "Data Team"
      description: "Analytics, data pipelines, reporting, ML experiments"
      config: "teams/data-team.yaml"

    - id: "mobile-team"
      name: "Mobile Team"
      description: "iOS and Android apps, React Native shared code"
      config: "teams/mobile-team.yaml"

# SETUP CONFIGURATION
setup:
  install:
    target_dir: "config/"

    files:
      - source: "welcome.yaml"
        dest: "config/welcome.yaml"
      - source: "resources.yaml"
        dest: "config/resources.yaml"

    directories:
      - source: "base/"
        dest: "config/base/"
      - source: "teams/"
        dest: "config/teams/"

  rollback:
    enabled: true
    persist_state: true

  post_install:
    message: |
      Your Acme Corp development environment is configured.

      What's set up:
      - Git configured with @acmecorp.com email
      - Docker pointing to our ECR registry
      - AWS CLI configured for SSO login
      - Pre-commit hooks for linting and secret detection

      Workspace layout:
        ~/work/services/       Microservices (and the monolith)
        ~/work/libraries/      Shared packages
        ~/work/infrastructure/ Terraform and K8s configs
        ~/work/docs/           Team docs and ADRs

      Next steps:
      1. Run 'aws sso login' to authenticate
      2. Run 'docker login ecr.acmecorp.com'
      3. Clone your team's repos (see your team config for the list)
      4. Join #engineering and your team's Slack channel

# User info fields
user_info_fields:
  - id: "name"
    label: "Full Name"
    type: "text"
    required: true
    placeholder: "Alice Chen"

  - id: "email"
    label: "Acme Email"
    type: "email"
    required: true
    placeholder: "alice@acmecorp.com"
    validation:
      pattern: ".*@acmecorp\\.com$"
      message: "Must be an @acmecorp.com email"

  - id: "team"
    label: "Team"
    type: "select"
    required: true
    options:
      - "Platform"
      - "Backend"
      - "Frontend"
      - "Data"
      - "Mobile"

  - id: "github_username"
    label: "GitHub Username"
    type: "text"
    required: true
    placeholder: "achen"
    description: "Your username on GitHub (we use github.com, not GHE)"

  - id: "manager"
    label: "Manager Name"
    type: "text"
    required: true
    placeholder: "Bob Martinez"

distribution:
  local:
    path: "prisms/acme-corp.prism/"
    discoverable: true

metadata:
  tags:
    - company
    - mid-size
    - aws
    - microservices
    - growing-team
  company_size: "medium"
  last_updated: "2026-03-15"
