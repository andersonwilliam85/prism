# Tool Registry — custom tools for ACME Corp prism.
# Tools defined here extend the base prism tool registry.

python3:
  label: Python 3
  summary: Python runtime
  description: General-purpose programming language — scripts, web backends, data science, and automation
  category: runtime
  platforms:
    mac: brew install python@3
    ubuntu: sudo apt-get install -y python3
    linux: sudo apt-get install -y python3
    windows: winget install Python.Python.3.12
  uninstall:
    mac: brew uninstall python@3
    ubuntu: sudo apt-get remove -y python3
    linux: sudo apt-get remove -y python3
    windows: winget uninstall Python.Python.3.12

nodejs:
  label: Node.js
  summary: JavaScript runtime
  description: Server-side JavaScript runtime — powers web apps, APIs, and build tooling
  category: runtime
  platforms:
    mac: brew install node
    ubuntu: sudo apt-get install -y nodejs
    linux: sudo apt-get install -y nodejs
    windows: winget install OpenJS.NodeJS
  uninstall:
    mac: brew uninstall node
    ubuntu: sudo apt-get remove -y nodejs
    linux: sudo apt-get remove -y nodejs
    windows: winget uninstall OpenJS.NodeJS

java:
  label: Java
  summary: JVM language
  description: Enterprise-grade language and runtime — Spring Boot, Android, and big data
  category: runtime
  platforms:
    mac: brew install openjdk
    ubuntu: sudo apt-get install -y default-jdk
    linux: sudo apt-get install -y default-jdk
    windows: winget install EclipseAdoptium.Temurin.21.JDK
  uninstall:
    mac: brew uninstall openjdk
    ubuntu: sudo apt-get remove -y default-jdk
    linux: sudo apt-get remove -y default-jdk
    windows: winget uninstall EclipseAdoptium.Temurin.21.JDK

vscode:
  label: VS Code
  summary: Extensible editor
  description: Microsoft's extensible editor — huge ecosystem of extensions
  category: editor
  platforms:
    mac: brew install --cask visual-studio-code
    ubuntu: sudo snap install code --classic
    linux: sudo snap install code --classic
    windows: winget install Microsoft.VisualStudioCode
  uninstall:
    mac: brew uninstall --cask visual-studio-code
    ubuntu: sudo snap remove code
    linux: sudo snap remove code
    windows: winget uninstall Microsoft.VisualStudioCode

postman:
  label: Postman
  summary: API platform
  description: Design, test, and document APIs with a visual interface and collections
  category: cli
  platforms:
    mac: brew install --cask postman
    ubuntu: sudo snap install postman
    linux: sudo snap install postman
    windows: winget install Postman.Postman
  uninstall:
    mac: brew uninstall --cask postman
    ubuntu: sudo snap remove postman
    linux: sudo snap remove postman
    windows: winget uninstall Postman.Postman

kubernetes:
  label: Kubernetes CLI
  summary: K8s CLI (alias)
  description: Alias entry for kubectl — deploy, inspect, and manage workloads on any Kubernetes cluster
  category: kubernetes
  platforms:
    mac: brew install kubernetes-cli
    ubuntu: sudo snap install kubectl --classic
    linux: sudo snap install kubectl --classic
    windows: winget install Kubernetes.kubectl
  uninstall:
    mac: brew uninstall kubernetes-cli
    ubuntu: sudo snap remove kubectl
    linux: sudo snap remove kubectl
    windows: winget uninstall Kubernetes.kubectl
