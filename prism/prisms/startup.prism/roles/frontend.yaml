# ============================================================================
# FRONTEND ENGINEER ROLE
# ============================================================================
# UI-focused: builds the product surface users interact with.
# Owns performance, accessibility, and design system implementation.

role:
  id: "frontend"
  name: "Frontend Engineer"
  description: "Build the UI — React, TypeScript, design systems, and fast iteration with hot reload"

tools_required:
  - git
  - gh
  - nvm
  - nodejs
  - prettier
  - eslint
  - curl
  - ripgrep
  - fzf

tools_optional:
  - docker
  - vercel-cli
  - netlify-cli
  - imagemagick
  - sentry-cli
  - lazygit
  - act
  - hugo

# ---------- What you will build ----------
tech_stack:
  frontend:
    - React / Next.js
    - TypeScript (strict mode)
    - Tailwind CSS
    - Storybook for component development
  testing:
    - Vitest for unit tests
    - Playwright for E2E tests
    - Chromatic for visual regression
  deployment:
    - Vercel for preview deploys on every PR
    - GitHub Actions for CI checks
  design:
    - Figma (design handoff)
    - Component library with Storybook

# ---------- Shell extras for frontend work ----------
shell:
  aliases:
    # Development
    nrd: "npm run dev"
    nrb: "npm run build"
    nrt: "npm run test"
    nrl: "npm run lint"
    nrs: "npm run storybook"
    yi: "yarn install"
    yd: "yarn dev"
    pi: "pnpm install"
    pd: "pnpm dev"

    # Preview and deploy
    preview: "vercel --yes"
    deploy: "vercel --prod --yes"

    # Bundle analysis
    analyze: "npm run build -- --analyze"
    bundlesize: "npx bundlesize"

    # Testing
    e2e: "npx playwright test"
    e2eui: "npx playwright test --ui"
    vitest: "npx vitest --ui"

    # Utilities
    lighthouse: "npx lighthouse http://localhost:3000 --view"
    imgopt: "find . -name '*.png' -exec convert {} -strip -quality 85 {} \\;"

# ---------- VS Code extensions for frontend ----------
vscode:
  extensions:
    - ms-vscode.vscode-typescript-next
    - dbaeumer.vscode-eslint
    - esbenp.prettier-vscode
    - bradlc.vscode-tailwindcss
    - styled-components.vscode-styled-components
    - github.copilot
    - ms-playwright.playwright
    - storybook.storybook-vscode
    - csstools.postcss
    - formulahendry.auto-rename-tag
