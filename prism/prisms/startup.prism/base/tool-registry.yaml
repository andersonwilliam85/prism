# ---------- Static Site & Frontend Tools ----------

hugo:
  label: Hugo
  summary: Static site generator
  description: Blazing-fast static site generator in Go — great for docs, blogs, and marketing sites
  category: frontend
  platforms:
    mac: brew install hugo
    ubuntu: sudo snap install hugo
    linux: sudo snap install hugo
    windows: winget install Hugo.Hugo.Extended
  uninstall:
    mac: brew uninstall hugo
    ubuntu: sudo snap remove hugo
    linux: sudo snap remove hugo
    windows: winget uninstall Hugo.Hugo.Extended

imagemagick:
  label: ImageMagick
  summary: Image processing
  description: Resize, crop, convert, and optimize images from the CLI — automate asset pipelines
  category: frontend
  platforms:
    mac: brew install imagemagick
    ubuntu: sudo apt-get install -y imagemagick
    linux: sudo apt-get install -y imagemagick
    windows: winget install ImageMagick.ImageMagick
  uninstall:
    mac: brew uninstall imagemagick
    ubuntu: sudo apt-get remove -y imagemagick
    linux: sudo apt-get remove -y imagemagick
    windows: winget uninstall ImageMagick.ImageMagick

# ---------- Security ----------

trivy:
  label: Trivy
  summary: Container scanner
  description: Scan container images and IaC for vulnerabilities — catch security issues before deploy
  category: security
  platforms:
    mac: brew install trivy
    ubuntu: "curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin"
    linux: "curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin"
  uninstall:
    mac: brew uninstall trivy
    ubuntu: sudo rm -f /usr/local/bin/trivy
    linux: sudo rm -f /usr/local/bin/trivy

# ---------- Rails-specific ----------

ruby-build:
  label: ruby-build
  summary: Ruby installer for rbenv
  description: Plugin for rbenv that compiles and installs Ruby versions from source
  category: runtime
  platforms:
    mac: brew install ruby-build
    ubuntu: "git clone https://github.com/rbenv/ruby-build.git \"$(rbenv root)\"/plugins/ruby-build"
    linux: "git clone https://github.com/rbenv/ruby-build.git \"$(rbenv root)\"/plugins/ruby-build"
  uninstall:
    mac: brew uninstall ruby-build
    ubuntu: "rm -rf \"$(rbenv root)\"/plugins/ruby-build"
    linux: "rm -rf \"$(rbenv root)\"/plugins/ruby-build"

foreman:
  label: Foreman
  summary: Procfile runner
  description: Run all your app processes from a Procfile — web server, workers, and jobs in one command
  category: runtime
  platforms:
    mac: gem install foreman
    ubuntu: gem install foreman
    linux: gem install foreman
  uninstall:
    mac: gem uninstall foreman
    ubuntu: gem uninstall foreman
    linux: gem uninstall foreman
