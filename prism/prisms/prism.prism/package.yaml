# ============================================================================
# PRISM — DEFAULT CONFIGURATION
# ============================================================================
# The default prism that ships with Prism. Works for individuals, small teams,
# and enterprise environments. Pick your scale, environment, and git platform.

package:
  name: "prism"
  version: "2.0.0"
  description: "Default Prism configuration — from solo developers to enterprise teams"
  author: "Prism"
  homepage: "https://github.com/andersonwilliam85/prism"
  support:
    github: "https://github.com/andersonwilliam85/prism/issues"
    community: "https://discord.gg/prism"

  type: "default"

  requires:
    onboarding_version: ">=1.0.0"
    python_version: ">=3.8"

# PRISM META-CONFIGURATION
prism_config:
  theme: "prism"
  theme_options:
    - "prism"
  custom_themes:
    - id: "prism"
      name: "Prism"
      gradient_1: "#667eea"
      gradient_2: "#764ba2"
      gradient_3: "#f093fb"
      gradient_4: "#f5576c"
      gradient_5: "#4facfe"
  default: true

  sources:
    - url: "local"
      name: "Built-in Prisms"
      type: "local"

  npm_registry: ""
  unpkg_url: ""

  branding:
    name: "Prism"
    tagline: "Refract complexity into clarity"

# BUNDLED SUB-PRISMS
# base is required; user picks scale, environment complexity, and git platform
bundled_prisms:
  base:
    - id: "prism-base"
      name: "Prism Base"
      description: "Core developer environment setup"
      required: true
      config: "base/prism-base.yaml"

  # Scale — who is this for?
  scale:
    - id: "personal"
      name: "Individual"
      description: "Solo developer, freelancer, personal projects"
      config: "profiles/personal.yaml"

    - id: "team"
      name: "Small Team"
      description: "Small team with shared conventions and PR workflows"
      config: "profiles/team.yaml"

    - id: "enterprise"
      name: "Enterprise"
      description: "Corporate environment with compliance, security, and multi-tier setup"
      config: "profiles/enterprise.yaml"

  # Environment complexity — how much structure?
  environment:
    - id: "minimal"
      name: "Minimal"
      description: "Just git config and SSH key — for devs who know what they want"
      config: "environments/minimal.yaml"

    - id: "standard"
      name: "Standard"
      description: "Git, SSH, common tools (VS Code, Docker, Node), and a workspace"
      config: "environments/standard.yaml"
      tools:
        - vscode
        - docker
        - node
        - git

    - id: "full"
      name: "Full-Featured"
      description: "Structured workspace, organized folders, multiple runtimes, dev utilities"
      config: "environments/full.yaml"
      tools:
        - vscode
        - docker
        - node
        - python3
        - git
        - gh
        - jq
        - httpie

  # Git platform
  platform:
    - id: "github"
      name: "GitHub"
      description: "GitHub.com"
      config: "profiles/github.yaml"

    - id: "gitlab"
      name: "GitLab"
      description: "GitLab.com or self-hosted"
      config: "profiles/gitlab.yaml"

    - id: "bitbucket"
      name: "Bitbucket"
      description: "Bitbucket for repositories"
      config: "profiles/bitbucket.yaml"

    - id: "gitea"
      name: "Gitea"
      description: "Self-hosted Gitea instance"
      config: "profiles/gitea.yaml"

    - id: "multi"
      name: "Multiple Platforms"
      description: "Multiple git platforms simultaneously"
      config: "profiles/multi-platform.yaml"

# SETUP CONFIGURATION
setup:
  install:
    target_dir: "config/"

    files:
      - source: "welcome.yaml"
        dest: "config/welcome.yaml"
        description: "Welcome message"
      - source: "resources.yaml"
        dest: "config/resources.yaml"
        description: "Developer resources"

    directories:
      - source: "base/"
        dest: "config/base/"
        description: "Base configuration files"
      - source: "environments/"
        dest: "config/environments/"
        description: "Environment complexity configs"
      - source: "profiles/"
        dest: "config/profiles/"
        description: "Scale and platform profiles"

  rollback:
    enabled: true
    persist_state: true

  post_install:
    message: |
      Prism installed!

      Your environment is ready. Here's what was set up:

        Scale:       {scale}
        Environment: {environment}
        Platform:    {platform}

      Next steps:
      1. Add your SSH key to your git provider
      2. Start coding!

# User info fields
user_info_fields:
  - id: "name"
    label: "Your Name"
    type: "text"
    required: true
    placeholder: "Jane Developer"
    description: "Your full name (for git commits)"

  - id: "email"
    label: "Email"
    type: "email"
    required: true
    placeholder: "jane@example.com"
    description: "Your email address (for git commits)"

  - id: "username"
    label: "Git Username"
    type: "text"
    required: true
    placeholder: "janedev"
    description: "Your username on chosen git platform"

# Distribution
distribution:
  local:
    path: "prisms/prism.prism/"
    discoverable: true

# Metadata
metadata:
  tags:
    - default
    - recommended
    - core
    - universal
    - personal
    - freelance
    - team
    - enterprise
  keywords:
    - default
    - starter
    - onboarding
  company_size: "any"
  regions: ["Global"]
  last_updated: "2026-03-10"
  maintainers:
    - "Prism"
