# ============================================================================
# OPEN SOURCE PRISM
# ============================================================================
# For open source maintainers and contributors who work across multiple
# projects, languages, and communities. Optimized for multi-repo workflows,
# GitHub-centric development, and the realities of maintaining public code.

package:
  name: "opensource-prism"
  version: "2.0.0"
  description: "Open source maintainer and contributor workstation — multi-repo, multi-language, GitHub-native"
  author: "OSS Maintainers"
  homepage: "https://github.com/your-project"
  support:
    github: "https://github.com/your-project/issues"

  type: "opensource"

  requires:
    onboarding_version: ">=1.0.0"

# PRISM META-CONFIGURATION
prism_config:
  theme: "community"
  theme_options:
    - "community"
    - "contributor"
    - "maintainer"
  custom_themes:
    - id: "community"
      name: "Community"
      gradient_1: "#238636"
      gradient_2: "#2ea043"
      gradient_3: "#3fb950"
      gradient_4: "#0d1117"
      gradient_5: "#161b22"
    - id: "contributor"
      name: "Contributor"
      gradient_1: "#d97706"
      gradient_2: "#f59e0b"
      gradient_3: "#fbbf24"
      gradient_4: "#1f2937"
      gradient_5: "#111827"
    - id: "maintainer"
      name: "Maintainer"
      gradient_1: "#4338ca"
      gradient_2: "#4f46e5"
      gradient_3: "#6366f1"
      gradient_4: "#818cf8"
      gradient_5: "#1e1b4b"

  sources:
    - url: "local"
      name: "Built-in Prisms"
      type: "local"

  branding:
    name: "Open Source Prism"
    tagline: "Ship, maintain, and contribute — across every repo."
    primary_color: "#059669"
    secondary_color: "#7c3aed"

# BUNDLED SUB-PRISMS
bundled_prisms:
  base:
    - id: "opensource-base"
      name: "Open Source Base"
      description: "Core OSS maintainer and contributor setup"
      required: true
      config: "base/opensource.yaml"

# SETUP CONFIGURATION
setup:
  install:
    target_dir: "config/"

    files:
      - source: "welcome.yaml"
        dest: "config/welcome.yaml"
      - source: "resources.yaml"
        dest: "config/resources.yaml"

    directories:
      - source: "base/"
        dest: "config/base/"

  post_install:
    message: |
      Open source prism installed.

      Workspace layout created:
        ~/oss/maintained/   - projects you own and maintain
        ~/oss/contributing/ - projects you contribute to
        ~/oss/forks/        - forked repos awaiting upstream merge

      Quick start:
        oss-fork <owner/repo>       - fork, clone, set upstream
        oss-sync                    - sync all forks with upstream
        oss-pr                      - create PR from current branch
        oss-release <version>       - tag, changelog, GitHub release

      Run 'gh auth login' if you haven't already.

# User info fields
user_info_fields:
  - id: "name"
    label: "Name"
    type: "text"
    required: true
    placeholder: "Alex Chen"
    description: "Name for git commits and DCO sign-off"

  - id: "email"
    label: "Email"
    type: "email"
    required: true
    placeholder: "alex@example.com"
    description: "For git commits and GPG key association"

  - id: "github_username"
    label: "GitHub Username"
    type: "text"
    required: true
    placeholder: "alexcodes"
    description: "Used for fork URLs and PR workflows"

  - id: "gpg_key_id"
    label: "GPG Key ID"
    type: "text"
    required: false
    placeholder: "ABCDEF1234567890"
    description: "For verified/signed commits (run 'gpg --list-secret-keys --keyid-format=long')"

  - id: "primary_languages"
    label: "Primary Languages"
    type: "text"
    required: false
    placeholder: "python, rust, go, typescript"
    description: "Languages you work in most — drives which linters and formatters to install"

distribution:
  local:
    path: "prisms/opensource.prism/"
    discoverable: true

  git:
    url: "https://github.com/your-project/dev-setup"
    branch: "main"

metadata:
  tags:
    - recommended
    - opensource
    - maintainer
    - contributor
    - multi-repo
    - github

  company_size: "community"
  regions: ["Global"]
  last_updated: "2026-03-15"
  maintainers:
    - "Open Source Community"
