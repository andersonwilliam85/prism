# ============================================================================
# UNIVERSITY PRISM — Academic Development Environment
# ============================================================================
# Configures tools and workspaces for students, faculty, and researchers.
# Designed to be forked and customized per institution.

package:
  name: "university-prism"
  version: "2.0.0"
  description: "Academic development environment for students, faculty, and researchers"
  author: "University IT Department"
  homepage: "https://university.edu/it"
  support:
    helpdesk: "it-help@university.edu"
    portal: "https://help.university.edu"

  type: "academic"

  requires:
    onboarding_version: ">=1.0.0"

# PRISM META-CONFIGURATION
prism_config:
  theme: "university-brand"
  theme_options:
    - "ocean"
    - "purple"
    - "forest"
    - "sunset"
    - "midnight"
    - "university-brand"
  custom_themes:
    - id: "university-brand"
      name: "University Colors"
      gradient_1: "#059669"
      gradient_2: "#047857"
      gradient_3: "#065f46"
      gradient_4: "#064e3b"
      gradient_5: "#022c22"

  sources:
    - url: "local"
      name: "Built-in Prisms"
      type: "local"

    - url: "https://prism.university.edu"
      name: "University Prism Registry"
      type: "remote"
      auth_required: true

  npm_registry: ""

  branding:
    name: "University Prism"
    tagline: "Empowering Learning & Research"
    logo_url: "https://university.edu/assets/seal.svg"
    primary_color: "#059669"
    secondary_color: "#dc2626"

# BUNDLED SETUP PRISMS
bundled_prisms:
  # Base — always applied
  base:
    - id: "university-base"
      name: "University Base Setup"
      description: "Core tools every university member needs: Git, Python, an editor"
      required: true
      config: "base/university.yaml"

  # Role selection — pick one
  user_type:
    - id: "student"
      name: "Student"
      description: "Undergrad or grad student — get language tools, Jupyter, and a clean course workspace"
      config: "users/student.yaml"

    - id: "faculty"
      name: "Faculty / TA"
      description: "Instructor or teaching assistant — grading tools, LaTeX, multi-language support"
      config: "users/faculty.yaml"

    - id: "researcher"
      name: "Researcher"
      description: "PhD student, postdoc, or research scientist — data science stack, HPC access, LaTeX"
      config: "users/researcher.yaml"

    - id: "staff"
      name: "IT Staff"
      description: "University IT — system administration and infrastructure tools"
      config: "users/staff.yaml"

  # Department selection — pick one or more
  departments:
    - id: "computer-science"
      name: "Computer Science"
      description: "Full dev stack: Python, Java, C/C++, Git, Docker, databases"
      config: "departments/cs.yaml"

    - id: "data-science"
      name: "Data Science"
      description: "Python, R, Jupyter, SQL, conda environments, visualization libraries"
      config: "departments/data-science.yaml"

    - id: "engineering"
      name: "Engineering"
      description: "C/C++, GNU Octave (MATLAB alternative), FreeCAD, debuggers"
      config: "departments/engineering.yaml"

    - id: "math"
      name: "Mathematics"
      description: "LaTeX, SageMath, Python for computation"
      config: "departments/math.yaml"

  # Course selection — optional, for students
  courses:
    - id: "cs101"
      name: "CS 101: Intro to Programming"
      description: "Python basics — no prior experience needed"
      config: "courses/cs101.yaml"

    - id: "cs201"
      name: "CS 201: Data Structures"
      description: "Java-based data structures and algorithms"
      config: "courses/cs201.yaml"

    - id: "cs301"
      name: "CS 301: Systems Programming"
      description: "C/C++, memory management, operating systems concepts"
      config: "courses/cs301.yaml"

# SETUP CONFIGURATION
setup:
  install:
    target_dir: "config/"

    files:
      - source: "welcome.yaml"
        dest: "config/welcome.yaml"

      - source: "resources.yaml"
        dest: "config/resources.yaml"
        description: "Library, HPC, canvas, etc."

    directories:
      - source: "base/"
        dest: "config/base/"

      - source: "users/"
        dest: "config/users/"

      - source: "departments/"
        dest: "config/departments/"

  post_install:
    message: |
      Welcome to your university development environment.

      Your tools are installed. Here is what to do next:

      1. Open VS Code:   code .
      2. Start Jupyter:  jupyter lab
      3. Check Git:      git config --list

      Key resources:
        Canvas:      https://canvas.university.edu
        Library:     https://library.university.edu
        HPC Cluster: ssh hpc  (after HPC setup)
        IT Help:     it-help@university.edu

      Your workspace directories have been created.
      Run `ls ~/courses` or `ls ~/research` to see them.

# User info fields
user_info_fields:
  - id: "name"
    label: "Full Name"
    type: "text"
    required: true
    placeholder: "Alex Chen"

  - id: "email"
    label: "University Email"
    type: "email"
    required: true
    placeholder: "achen@university.edu"

  - id: "student_id"
    label: "Student/Employee ID"
    type: "text"
    required: true
    placeholder: "12345678"

  - id: "user_type"
    label: "I am a..."
    type: "select"
    required: true
    options:
      - "Student (Undergrad)"
      - "Student (Graduate)"
      - "Faculty / TA"
      - "Researcher"
      - "IT Staff"

  - id: "semester"
    label: "Current Semester"
    type: "select"
    required: false
    options:
      - "fall-2025"
      - "spring-2026"
      - "summer-2026"
      - "fall-2026"

# Distribution
distribution:
  local:
    path: "prisms/university.prism/"
    discoverable: true

  internal:
    url: "https://prism.university.edu"
    auth_required: true

# Metadata
metadata:
  tags:
    - university
    - academic
    - education
    - research
    - students
    - faculty

  keywords:
    - higher-education
    - university
    - college

  company_size: "academic"
  regions: ["Global"]

  last_updated: "2026-03-15"
