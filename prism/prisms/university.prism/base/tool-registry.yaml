# Tool Registry — academic-specific tools for the university prism.
# These supplement the base tool registry at prism.prism/base/tool-registry.yaml.
# Tools already in the base registry (git, code, docker, gh, etc.) are referenced
# by name only in configs — they do NOT need entries here.

# ── Languages & Runtimes ─────────────────────────────────────────────────────

python3:
  label: Python 3
  summary: General-purpose language
  description: Python interpreter with pip and venv — the default language for most courses, data science, and research
  category: runtime
  platforms:
    mac: brew install python@3
    ubuntu: sudo apt-get install -y python3 python3-pip python3-venv
    linux: sudo apt-get install -y python3 python3-pip python3-venv
    windows: winget install Python.Python.3.12
  uninstall:
    mac: brew uninstall python@3
    ubuntu: sudo apt-get remove -y python3 python3-pip python3-venv
    linux: sudo apt-get remove -y python3 python3-pip python3-venv
    windows: winget uninstall Python.Python.3.12

openjdk:
  label: OpenJDK
  summary: Java Development Kit
  description: Open-source Java compiler and runtime — needed for CS data structures, algorithms, and software engineering courses
  category: runtime
  platforms:
    mac: brew install openjdk
    ubuntu: sudo apt-get install -y default-jdk
    linux: sudo apt-get install -y default-jdk
    windows: winget install EclipseAdoptium.Temurin.21.JDK
  uninstall:
    mac: brew uninstall openjdk
    ubuntu: sudo apt-get remove -y default-jdk
    linux: sudo apt-get remove -y default-jdk
    windows: winget uninstall EclipseAdoptium.Temurin.21.JDK

gcc:
  label: GCC
  summary: C/C++ compiler
  description: GNU Compiler Collection for C and C++ — required for systems programming, OS, and engineering courses
  category: runtime
  platforms:
    mac: xcode-select --install
    ubuntu: sudo apt-get install -y build-essential
    linux: sudo apt-get install -y build-essential
    windows: winget install GnuWin32.Make
  uninstall:
    mac: sudo rm -rf /Library/Developer/CommandLineTools
    ubuntu: sudo apt-get remove -y build-essential
    linux: sudo apt-get remove -y build-essential
    windows: winget uninstall GnuWin32.Make

cmake:
  label: CMake
  summary: C/C++ build system
  description: Cross-platform build system generator for C/C++ projects — used in engineering and systems courses
  category: runtime
  platforms:
    mac: brew install cmake
    ubuntu: sudo apt-get install -y cmake
    linux: sudo apt-get install -y cmake
    windows: winget install Kitware.CMake
  uninstall:
    mac: brew uninstall cmake
    ubuntu: sudo apt-get remove -y cmake
    linux: sudo apt-get remove -y cmake
    windows: winget uninstall Kitware.CMake

r-lang:
  label: R
  summary: Statistical computing
  description: Language for statistical computing, data visualization, and bioinformatics — widely used in data science and social sciences
  category: runtime
  platforms:
    mac: brew install r
    ubuntu: sudo apt-get install -y r-base r-base-dev
    linux: sudo apt-get install -y r-base r-base-dev
    windows: winget install RProject.R
  uninstall:
    mac: brew uninstall r
    ubuntu: sudo apt-get remove -y r-base r-base-dev
    linux: sudo apt-get remove -y r-base r-base-dev
    windows: winget uninstall RProject.R

rstudio:
  label: RStudio
  summary: R IDE
  description: Full IDE for R with data viewer, plot pane, and integrated package manager
  category: editor
  platforms:
    mac: brew install --cask rstudio
    ubuntu: sudo apt-get install -y rstudio
    linux: sudo apt-get install -y rstudio
    windows: winget install Posit.RStudio
  uninstall:
    mac: brew uninstall --cask rstudio
    ubuntu: sudo apt-get remove -y rstudio
    linux: sudo apt-get remove -y rstudio
    windows: winget uninstall Posit.RStudio

# ── Data Science & Notebooks ─────────────────────────────────────────────────

jupyter:
  label: JupyterLab
  summary: Interactive notebooks
  description: Browser-based notebooks for Python, R, Julia — essential for data science courses, research, and teaching demos
  category: data-science
  platforms:
    mac: pip3 install --user jupyterlab notebook ipykernel
    ubuntu: pip3 install --user jupyterlab notebook ipykernel
    linux: pip3 install --user jupyterlab notebook ipykernel
    windows: pip install jupyterlab notebook ipykernel
  uninstall:
    mac: pip3 uninstall -y jupyterlab notebook ipykernel
    ubuntu: pip3 uninstall -y jupyterlab notebook ipykernel
    linux: pip3 uninstall -y jupyterlab notebook ipykernel
    windows: pip uninstall -y jupyterlab notebook ipykernel

conda:
  label: Miniforge (conda)
  summary: Environment manager
  description: Conda package and environment manager via Miniforge — isolate dependencies per project or course without conflicts
  category: data-science
  platforms:
    mac: brew install miniforge
    ubuntu: "curl -L -O https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh && bash Miniforge3-Linux-x86_64.sh -b -p $HOME/miniforge3 && rm Miniforge3-Linux-x86_64.sh"
    linux: "curl -L -O https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh && bash Miniforge3-Linux-x86_64.sh -b -p $HOME/miniforge3 && rm Miniforge3-Linux-x86_64.sh"
    windows: winget install CondaForge.Miniforge3
  uninstall:
    mac: brew uninstall miniforge
    ubuntu: rm -rf $HOME/miniforge3
    linux: rm -rf $HOME/miniforge3
    windows: winget uninstall CondaForge.Miniforge3

datasci-python:
  label: Python Data Science Stack
  summary: numpy, pandas, matplotlib, scikit-learn
  description: Core Python libraries for data science courses — numpy, pandas, matplotlib, seaborn, scikit-learn installed together
  category: data-science
  platforms:
    mac: pip3 install --user numpy pandas matplotlib seaborn scikit-learn scipy
    ubuntu: pip3 install --user numpy pandas matplotlib seaborn scikit-learn scipy
    linux: pip3 install --user numpy pandas matplotlib seaborn scikit-learn scipy
    windows: pip install numpy pandas matplotlib seaborn scikit-learn scipy
  uninstall:
    mac: pip3 uninstall -y numpy pandas matplotlib seaborn scikit-learn scipy
    ubuntu: pip3 uninstall -y numpy pandas matplotlib seaborn scikit-learn scipy
    linux: pip3 uninstall -y numpy pandas matplotlib seaborn scikit-learn scipy
    windows: pip uninstall -y numpy pandas matplotlib seaborn scikit-learn scipy

