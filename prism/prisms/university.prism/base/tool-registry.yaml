# ── HPC & Remote Computing ───────────────────────────────────────────────────

hpc-tools:
  label: HPC Tools
  summary: Cluster computing utilities
  description: SSH config and tools for connecting to university HPC clusters — includes SSH key generation and config template
  category: academic
  platforms:
    mac: "ssh-keygen -t ed25519 -f ~/.ssh/hpc_cluster -N '' -C 'university-hpc' 2>/dev/null; echo 'Host hpc\n  HostName hpc.university.edu\n  User ${USER}\n  IdentityFile ~/.ssh/hpc_cluster\n  ForwardAgent yes' >> ~/.ssh/config"
    ubuntu: "ssh-keygen -t ed25519 -f ~/.ssh/hpc_cluster -N '' -C 'university-hpc' 2>/dev/null; echo 'Host hpc\n  HostName hpc.university.edu\n  User ${USER}\n  IdentityFile ~/.ssh/hpc_cluster\n  ForwardAgent yes' >> ~/.ssh/config"
    linux: "ssh-keygen -t ed25519 -f ~/.ssh/hpc_cluster -N '' -C 'university-hpc' 2>/dev/null; echo 'Host hpc\n  HostName hpc.university.edu\n  User ${USER}\n  IdentityFile ~/.ssh/hpc_cluster\n  ForwardAgent yes' >> ~/.ssh/config"
  uninstall:
    mac: rm -f ~/.ssh/hpc_cluster ~/.ssh/hpc_cluster.pub
    ubuntu: rm -f ~/.ssh/hpc_cluster ~/.ssh/hpc_cluster.pub
    linux: rm -f ~/.ssh/hpc_cluster ~/.ssh/hpc_cluster.pub

