# ============================================================================
# WALMART CONFIG PACKAGE
# ============================================================================
# Complete Walmart development environment configuration
# Includes: base config, sub-orgs, departments, teams, resources, welcome page

package:
  name: "walmart-config"
  version: "1.0.0"
  description: "Complete Walmart development environment configuration with hierarchy"
  author: "Walmart Engineering"
  homepage: "https://dx.walmart.com"
  support:
    slack: "#dev-tools-support"
    email: "devtools@walmart.com"
  
  # Package type
  type: "company"  # company, sub-org, department, or team
  
  # Compatibility
  requires:
    onboarding_version: ">=1.0.0"  # Minimum dev-onboarding version
    python_version: ">=3.8"
  
  # Installation
  install:
    # Where to install files (relative to project root)
    target_dir: "config/"
    
    # Files to copy
    files:
      - source: "welcome.yaml"
        dest: "config/welcome.yaml"
        description: "Welcome page content"
      
      - source: "resources.yaml"
        dest: "config/resources.yaml"
        description: "Walmart resource links"
    
    # Directories to copy (all files within)
    directories:
      - source: "base/"
        dest: "config/base/"
        description: "Company base configuration"
      
      - source: "orgs/"
        dest: "config/orgs/"
        description: "Sub-organization configs"
      
      - source: "departments/"
        dest: "config/departments/"
        description: "Department configs"
      
      - source: "teams/"
        dest: "config/teams/"
        description: "Team configs"
  
  # Post-install message
  post_install:
    message: |
      🎉 Walmart config installed successfully!
      
      Next steps:
      1. Edit config/inheritance.yaml to select your org/dept/team
      2. Run: python3 install-ui.py
      3. Connect to VPN or walmartwifi network
      4. Follow the web installer wizard!
      
      ⚠️  Important: Use 'walmartwifi' network, NOT 'eagle' WiFi!
      
      Support: #dev-tools-support on Slack

# User info fields (what to collect during setup)
user_info_fields:
  - id: "name"
    label: "Full Name"
    type: "text"
    required: true
    placeholder: "John Doe"
    description: "Your full legal name"
  
  - id: "email"
    label: "Walmart Email"
    type: "email"
    required: true
    placeholder: "john.doe@walmart.com"
    description: "Your @walmart.com email address"
    validation:
      pattern: ".*@walmart\.com$"
      message: "Must be a @walmart.com email"
  
  - id: "ldap_username"
    label: "LDAP Username"
    type: "text"
    required: true
    placeholder: "jdoe123"
    description: "Your Walmart LDAP/network username"
  
  - id: "employee_id"
    label: "Employee ID"
    type: "text"
    required: false
    placeholder: "W0123456"
    description: "Your Walmart employee ID (optional)"
  
  - id: "cost_center"
    label: "Cost Center"
    type: "text"
    required: false
    placeholder: "12345"
    description: "Your team's cost center (optional)"

# Package contents
contents:
  base_config: "base/walmart.yaml"
  welcome_page: "welcome.yaml"
  resources: "resources.yaml"
  readme: "README.md"
  
  # Available sub-organizations
  sub_orgs:
    - id: "walmart-us"
      name: "Walmart US"
      file: "orgs/walmart-us.yaml"
      description: "United States operations"
  
  # Available departments (examples included)
  departments:
    - id: "supply-chain"
      name: "Supply Chain Technology"
      file: "departments/supply-chain.yaml"
      sub_orgs: ["walmart-us"]
  
  # Available teams (examples included)
  teams:
    - id: "receiving-systems"
      name: "Receiving Systems"
      file: "teams/receiving-systems.yaml"
      department: "supply-chain"

# Distribution (for future package registry)
distribution:
  # Package registry (future)
  registry:
    url: "https://artifactory.walmart.com/config-packages/"
    namespace: "walmart"
  
  # Git repository (current)
  git:
    url: "https://gecgithub01.walmart.com/engineering/dev-onboarding"
    branch: "main"
    path: "config-packages/walmart"
  
  # Local discovery (current)
  local:
    path: "config-packages/walmart/"
    discoverable: true

# Metadata for discovery
metadata:
  tags:
    - walmart
    - enterprise
    - complete
    - hierarchical
  
  keywords:
    - supply-chain
    - kubernetes
    - python
    - java
    - typescript
  
  company_size: "large"  # small, medium, large, enterprise
  regions: ["US"]
  
  last_updated: "2026-03-04"
  maintainers:
    - "Walmart Dev Tools Team"
