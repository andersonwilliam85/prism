# ============================================================================
# INSTALLATION GUIDANCE (Company-specific workarounds)
# ============================================================================
installation:
  title: "🔧 Installation Tips for Walmart"
  
  # Pre-install requirements
  prerequisites:
    title: "Before You Start"
    items:
      - text: "**Connect to VPN or Eagle WiFi** - Required for all Walmart tools"
        required: true
        icon: "🔒"
      
      - text: "If on Mac, use **walmartwifi** network (not eagle WiFi) to avoid proxy issues"
        required: false
        icon: "⚠️"
        platforms: ["mac"]
        detail: |
          Eagle WiFi has known issues with brew and some installers.
          Use 'walmartwifi' network for smoother installation.
      
      - text: "Windows users: Run PowerShell as Administrator"
        required: true
        platforms: ["windows"]
        icon: "🖥️"
  
  # During installation
  during_install:
    title: "During Installation"
    items:
      - text: "Brew/npm/pip installations use Walmart proxy automatically"
        type: "info"
      
      - text: "If brew fails, switch to 'walmartwifi' network and retry"
        type: "warning"
        platforms: ["mac"]
      
      - text: "GitHub CLI (gh) requires authentication via browser"
        type: "info"
        detail: "You'll be redirected to gecgithub01.walmart.com to authorize"
      
      - text: "Code Puppy install opens browser - authenticate with PingFed SSO"
        type: "info"
  
  # Post-install
  post_install:
    title: "After Installation"
    items:
      - text: "Add your SSH key to GitHub Enterprise at https://gecgithub01.walmart.com/settings/keys"
        required: true
        icon: "🔑"
      
      - text: "Test Code Puppy: `puppy --version` (should show version number)"
        type: "check"
      
      - text: "Join your team's Slack channels (listed in your team config)"
        type: "todo"

# ============================================================================
# TROUBLESHOOTING (Company-specific)
# ============================================================================
troubleshooting:
  title: "❓ Common Issues at Walmart"
  
  issues:
    - problem: "brew install fails with proxy error"
      solution: |
        1. Switch to 'walmartwifi' network (not eagle)
        2. Or manually set proxy:
           ```bash
           export HTTP_PROXY=http://sysproxy.wal-mart.com:8080
           export HTTPS_PROXY=http://sysproxy.wal-mart.com:8080
           ```
        3. Retry: `brew install <package>`
      platforms: ["mac"]
    
    - problem: "Code Puppy says 'Not authenticated'"
      solution: |
        1. Ensure you're on VPN or Eagle/walmartwifi
        2. Run: `puppy auth login`
        3. Authenticate via browser (PingFed SSO)
      platforms: ["all"]
    
    - problem: "npm install fails with certificate error"
      solution: |
        Walmart npm registry requires proxy:
        ```bash
        npm config set registry https://npm.ci.artifacts.walmart.com/artifactory/api/npm/npm-virtual/
        npm config set strict-ssl false
        ```
      platforms: ["all"]
    
    - problem: "Can't access gecgithub01.walmart.com"
      solution: |
        1. Verify VPN connection
        2. Request GitHub Enterprise access via ServiceNow
        3. Check with your manager if access is pending
      platforms: ["all"]
    
    - problem: "kubectl can't connect to cluster"
      solution: |
        1. Get kubeconfig from your team lead
        2. Set context: `kubectl config use-context <your-cluster>`
        3. Test: `kubectl get pods`
      platforms: ["all"]

