troubleshooting:
  title: "❓ Common Issues"
  
  issues:
    - problem: "SSH authentication fails"
      solution: |
        1. Check SSH key is added to your platform
        2. Test: ssh -T git@github.com (or gitlab.com, etc.)
        3. Make sure key permissions: chmod 600 ~/.ssh/id_ed25519
      platforms: ["all"]
    
    - problem: "Git asks for password every time"
      solution: |
        1. Use SSH instead of HTTPS for remotes
        2. Or use credential helper:
           macOS: git config --global credential.helper osxkeychain
           Windows: git config --global credential.helper manager-core
           Linux: git config --global credential.helper libsecret
      platforms: ["all"]
    
    - problem: "Which git platform should I use?"
      solution: |
        **GitHub:**
        - Best for: Open source, portfolio, job hunting
        - Pros: Huge community, GitHub Actions, free private repos
        - Cons: Limited CI/CD minutes on free tier
        
        **GitLab:**
        - Best for: Solo projects, self-hosting, better CI/CD
        - Pros: Better free CI/CD, container registry, can self-host
        - Cons: Smaller community than GitHub
        
        **Bitbucket:**
        - Best for: If using Jira/Confluence
        - Pros: Good Atlassian integration
        - Cons: Smaller community
        
        **Gitea (self-hosted):**
        - Best for: Privacy, learning DevOps, full control
        - Pros: Lightweight, no vendor lock-in, free
        - Cons: You maintain the server
        
        **My recommendation:** Start with GitHub for portfolio visibility!
      platforms: ["all"]

