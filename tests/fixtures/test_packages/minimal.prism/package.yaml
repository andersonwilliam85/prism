package:
  name: "minimal-test-prism"
  version: "1.0.0"
  description: "Minimal test prism for unit testing"
  author: "Test Suite"
  
  type: "test"
  
  requires:
    onboarding_version: ">=1.0.0"
    python_version: ">=3.8"

user_info_fields:
  - id: "name"
    label: "Name"
    type: "text"
    required: true
    placeholder: "Test User"
  
  - id: "email"
    label: "Email"
    type: "email"
    required: true
    placeholder: "test@example.com"
