name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & publish to GitHub Pages
    runs-on: ubuntu-latest
    container: ruby:3
    steps:
      - uses: actions/checkout@v6

      - name: Install Jekyll dependencies
        run: cd docs && bundle install

      - name: Build site
        run: cd docs && bundle exec jekyll build --destination ../_site
        env:
          JEKYLL_ENV: production

      - name: Push to gh-pages
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "Gitea CI"
          git config user.email "ci@neuralplatform.ai"
          cd _site
          git init
          git add -A
          git commit -m "docs: deploy from ${GITEA_SHA::8}"
          git push --force \
            "https://x-access-token:${GH_PAT}@github.com/andersonwilliam85/prism.git" \
            HEAD:gh-pages
