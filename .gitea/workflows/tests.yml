name: Tests

on:
  push:
    branches: [main, dev, stage]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: [main, dev, stage]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'

jobs:
  test:
    name: Test (Python 3.11)
    runs-on: self-hosted
    container: python:3.11
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=. --cov-report=xml --ignore=tests/unit/utilities/

      - name: Run package unit tests
        run: PYTHONPATH=. pytest tests/unit/utilities/ -v

      - name: Run integration tests
        run: pytest tests/integration/ -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml

  lint:
    name: Lint
    runs-on: self-hosted
    container: python:3.11
    steps:
      - uses: actions/checkout@v4

      - name: Install linting tools
        run: pip install flake8 black isort mypy

      - name: Run flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check formatting
        run: black --check . --line-length 120

      - name: Check import sorting
        run: isort --check-only . --profile black --line-length 120

      - name: Type checking
        run: mypy . --ignore-missing-imports || true
